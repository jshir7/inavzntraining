  <script>
    /* ── Startup safety net ──────────────────────────────────────────
       If a CDN script fails to load, or Babel can't compile the app,
       replace the spinner with a clear message + Reload button instead
       of leaving the user stuck on an endless loading screen. */
    (function () {
      var handled = false;
      function appMounted() {
        var r = document.getElementById('root');
        return !!(r && r.childElementCount > 0);
      }
      function showError(msg) {
        if (handled || appMounted()) return;
        handled = true;
        var el = document.getElementById('loading');
        if (!el) return;
        el.style.opacity = '1';
        el.innerHTML =
          '<div style="max-width:320px;text-align:center;font-family:sans-serif;padding:24px">' +
            '<div style="font-weight:900;letter-spacing:.22em;font-size:20px;margin-bottom:14px;color:#f5f5f5">INAVZN</div>' +
            '<div style="color:#ff4560;font-size:13px;font-weight:700;margin-bottom:8px">Couldn\u2019t start the app</div>' +
            '<div style="color:#888;font-size:12px;line-height:1.55;margin-bottom:18px">' + (msg || 'Something went wrong while loading.') + '</div>' +
            '<button onclick="location.reload()" style="background:#c8a4ff;color:#000;border:none;border-radius:20px;padding:9px 22px;font-weight:700;font-size:12px;cursor:pointer">Reload</button>' +
          '</div>';
      }
      window.__inavznShowError = showError;
      window.addEventListener('error', function (e) {
        if (appMounted()) return;
        showError((e && e.message) || 'A script error occurred during startup.');
      });
      setTimeout(function () {
        if (!appMounted()) showError('The app took too long to start. Check your connection and reload.');
      }, 20000);
    })();
  </script>

/* ═══ DYNAMIC TARGET SCALING SYSTEM ══════════════════════
   Targets scale by:
   1. Bodyweight ratio   — each lift has a baseline BW multiplier
                           drawn from football sports science literature
   2. Phase multiplier   — off/pre/in season adjustments
   3. Position modifier  — some positions need more/less of certain qualities

   BW multipliers (per lift, per phase) represent where
   professional-level footballers benchmark at that position:
   e.g. Trap Bar Deadlift 1.8× BW is elite academy/lower-league pro level
═══════════════════════════════════════════════════════════ */

// Per-exercise base BW multipliers at each phase for a CAM / "standard" outfield player
// Format: { off: multiplier_at_offseason_end, pre: preseason_end, ins: inseason_maintain }
// Special units "bw" or "-" return as-is. "cm"/"m" have fixed targets, not BW-scaled.
const BW_MULT = {
  // LOWER
  trapbar:  { off:1.45, pre:1.9,  ins:1.6  },
  bsquat:   { off:0.8,  pre:1.35, ins:1.15 },
  bss:      { off:0.36, pre:0.52, ins:0.43 },
  rdl:      { off:0.95, pre:1.5,  ins:1.25 },
  stepup:   { off:0.25, pre:0.42, ins:0.33 },
  hamcurl:  { off:0.54, pre:0.76, ins:0.65 },
  nordic:   { off:null, pre:null, ins:null  }, // BW only
  calf:     { off:null, pre:0.46, ins:0.30 }, // off = BW, pre/ins = added kg
  leqiso:   { off:null, pre:null, ins:null  },
  spannsq:  { off:null, pre:null, ins:null  },
  // UPPER
  bench:    { off:0.78, pre:1.22, ins:1.06 },
  pullup:   { off:null, pre:0.18, ins:0.12 }, // added kg over BW
  row:      { off:0.62, pre:1.1,  ins:0.92 },
  ohp:      { off:0.55, pre:0.84, ins:0.70 },
  incline:  { off:0.28, pre:0.43, ins:0.34 }, // per DB (×2 total)
  lat:      { off:0.70, pre:0.92, ins:0.80 },
  extrot:   { off:0.09, pre:0.15, ins:0.12 },

  deadbug:  { off:null, pre:null, ins:null  },
  plank:    { off:null, pre:null, ins:null  }, // time-based
  pallof:   { off:0.12, pre:0.21, ins:0.16 },
  russian:  { off:0.09, pre:0.18, ins:0.12 },

  medball:  { off:0.06, pre:0.09, ins:0.07 },

  // POWER (fixed distances/heights — not BW scaled)
  boxjump:  { off:null, pre:null, ins:null  },

  clean:    { off:0.62, pre:0.92, ins:0.76 },
  slam:     { off:null, pre:null, ins:null  },

// Plank / time targets (seconds) — fixed
const TIME_TARGETS = {
  plank: { off:"45", pre:"75", ins:"60" },
};

// Fixed distance/height targets (box jump cm, broad jump m) — not BW dependent
const FIXED_TARGETS = {
  boxjump: { off:"50", pre:"65", ins:"60" },
  broad:   { off:"1.8", pre:"2.2", ins:"2.0" },
  slam:    { off:"5", pre:"8", ins:"6" },
};

// Position modifiers — multipliers on certain muscle groups
// CAM = baseline (1.0 everywhere). Others adjust relative to CAM.
const POS_MOD = {
  CAM:  { lower:1.00, upper:1.00, power:1.00, core:1.00 },
  CM:   { lower:1.05, upper:1.00, power:1.00, core:1.05 },
  CDM:  { lower:1.10, upper:1.05, power:0.95, core:1.10 },
  ST:   { lower:1.05, upper:1.05, power:1.10, core:1.00 },
  LW:   { lower:0.95, upper:0.95, power:1.05, core:0.95 },
  RW:   { lower:0.95, upper:0.95, power:1.05, core:0.95 },
  CB:   { lower:1.20, upper:1.15, power:1.05, core:1.15 },
  LB:   { lower:1.05, upper:0.95, power:1.05, core:1.05 },
  RB:   { lower:1.05, upper:0.95, power:1.05, core:1.05 },
  GK:   { lower:1.10, upper:1.20, power:1.10, core:1.20 },
};

// Which category does each exercise belong to (for position modifier)
const EX_CAT = {
  trapbar:"lower",bsquat:"lower",bss:"lower",rdl:"lower",stepup:"lower",
  hamcurl:"lower",nordic:"lower",calf:"lower",leqiso:"lower",spannsq:"lower",
  bench:"upper",pullup:"upper",row:"upper",ohp:"upper",incline:"upper",
  lat:"upper",extrot:"upper",chinup:"upper",
  deadbug:"core",plank:"core",pallof:"core",russian:"core",copenh:"core",
  hanging:"core",medball:"core",sidepl:"core",
  boxjump:"power",broad:"power",clean:"power",slam:"power",
};

function getT(ex, phase, weightKg = 64, position = "CAM") {
  const phKey = { offseason:"off", preseason:"pre", inseason:"ins" }[phase] || "off";
  const bw = parseFloat(weightKg) || 64;

  // Time-based exercises
  if (TIME_TARGETS[ex.id]) return TIME_TARGETS[ex.id][phKey];

  // Fixed (non-BW) exercises
  if (FIXED_TARGETS[ex.id]) return FIXED_TARGETS[ex.id][phKey];

  const mult = BW_MULT[ex.id];
  if (!mult || mult[phKey] === null) return ex.t?.[phKey] || "-";

  // Calf raise off-season = BW only
  if (ex.id === "calf" && phKey === "off") return "BW";

  // Pull-ups off-season = BW only
  if (ex.id === "pullup" && phKey === "off") return "BW";

  // Position modifier
  const cat = EX_CAT[ex.id] || "lower";
  const posMod = POS_MOD[position]?.[cat] ?? 1.0;

  const raw = bw * mult[phKey] * posMod;
  // Round to nearest 2.5kg (standard plate increment)
  const rounded = Math.round(raw / 2.5) * 2.5;
  return rounded.toString();
}

/* ═══ TAPER WEEK SCHEDULE ════════════════════════════════ */
function buildTaperSched(eventLabel, eventDate, viewedWeekMonday, normalSched) {
  const prehab = () => ({id:"prehab",title:"Prehab · 15 min (Daily — Never Skip)",icon:"🛡",color:"#e8c84a",kind:"prehab"});
  const foot  = (id,title,icon,color,items) => ({id,title,icon,color,kind:"foot",items});
  const gym   = (id,title,icon,color,exIds) => ({id,title,icon,color,kind:"gym",exIds});
  const sprint= (id,title,icon,color,items) => ({id,title,icon,color,kind:"sprint",items});
  const label = eventLabel || "Event";

  // Sports science taper principles:
  // — Volume drops 40–60% across the week (fewer sets, not lighter weights)
  // — Intensity MAINTAINED — same weights, same speed, just less of it
  // — Frequency kept up — body needs to feel the stimulus, not forget it
  // — No new exercises or movements — nothing unfamiliar before the event
  // — CNS kept sharp with short explosive work right up to D-2
  // — Full rest only on D-1 (eve) and strategic recovery on D-4

  const taperDays = [
    // D-6: Full gym session, volume reduced to 60% — keep weights, drop sets
    {label:"Taper D-6 — Full Gym (60% Volume)", type:"gym+sprint", blocks:[
      prehab(),
      gym("t_upper","Upper Body — Full Intensity, 60% Volume","💪","#9b72cf",
        ["bench","pullup","row","ohp","extrot"]),
      sprint("t_speed6","Speed Maintenance — Short & Sharp","⚡","#1ed760",[
        {n:"4 × 30m Sprint (Full Speed)",d:"Maintain your top-end speed. Full recovery between. Not fitness work — neuromuscular maintenance. Keep what you've built.",key:true},
        {n:"6 × 10m Acceleration",d:"Explosive first step. Reset fully between reps. Fast-twitch fibres need the signal — give it to them.",key:true},
        {n:"Foam Roll + Full Stretch (15 min)",d:"Quads, hamstrings, hip flexors, calves. Thoracic rotation. Arriving loose is part of the prep.",key:false},
      ]),
    ]},
    // D-5: Lower gym (60% volume) + technical football
    {label:"Taper D-5 — Lower Gym + Technical", type:"gym", blocks:[
      prehab(),
      gym("t_lower","Lower Body — Full Intensity, 60% Volume","🏋","#e8c84a",
        ["trapbar","bss","rdl","nordic","calf"]),
      foot("t_tech5","Technical Quality Session","⚽","#c8a4ff",[
        {n:"Ball Mastery (15 min)",d:"Full mastery circuit — inside/outside, rolls, laces, sole. Both feet equally. Touch needs to feel automatic.",key:false},
        {n:"Wall Passes — 1-Touch & 2-Touch (10 min)",d:"Crisp, controlled, fast. You're rehearsing match patterns. Every pass is deliberate.",key:true},
        {n:"Finishing — 20 Shots",d:"Half from inside the box, half from edge. Placed and powerful. Quality over quantity — stop if touch dips.",key:true},
        {n:"1v1 Moves — 3 Reps Each Side",d:"Your go-to moves. Lock them in before the event. Clean execution, explosive exit.",key:true},
      ]),
    ]},
    // D-4: Active recovery + core — no heavy loading
    {label:"Taper D-4 — Active Recovery + Core", type:"gym", blocks:[
      prehab(),
      gym("t_core","Core & Stability Only — Light Day","🧱","#00bcd4",
        ["plank","pallof","deadbug","copenh","sidepl"]),
      foot("t_rec4","Active Recovery Protocol","💧","#00bcd4",[
        {n:"20 min Easy Jog (60% MAS)",d:"Flush the legs. Increase blood flow without adding fatigue. Conversational pace — if you can't talk, you're too fast.",key:false},
        {n:"Hip & Ankle Mobility Circuit (15 min)",d:"90/90 hip stretch, pigeon pose, ankle circles, banded hip flexor. Hold 60s each. Arriving mobile = arriving ready.",key:true},
        {n:"Nutrition: Carb Loading Begins",d:"Target 350–400g carbs today. Rice, pasta, oats, fruit. Glycogen takes 36–48hrs to fully load. Start now.",key:true},
        {n:"Sleep: Target 9 Hours",d:"Growth hormone peaks in deep sleep. Muscle repairs. Energy stores. This is as important as any session.",key:true},
      ]),
    ]},
    // D-3: Sharp sprint session + light technical — last hard stimulus
    {label:"Taper D-3 — CNS Primer + Technical", type:"sprint", blocks:[
      prehab(),
      sprint("t_cns3","CNS Activation — Last Speed Session","⚡","#1ed760",[
        {n:"3 × 20m Sprint (95% Effort)",d:"Fast, controlled, explosive. 95% not 100% — you want sharpness not fatigue. 3 min full rest between.",key:true},
        {n:"4 × 30m Sprint (Full Speed)",d:"Your fastest. Full recovery. This is the last time you sprint at full pace before the event. Make it count.",key:true},
        {n:"3 × 40m Sprint (85% — Sustained Speed)",d:"Longer effort to maintain speed endurance. This is your last conditioning stimulus. Controlled aggression.",key:true},
        {n:"6 × Change of Direction — Full Pace",d:"Plant, cut, accelerate. Both directions. Match-realistic angles. Confirm your body is responding sharply.",key:true},
        {n:"Static Stretch — Full Lower Body (10 min)",d:"Hold each stretch 45–60s. Quads, hamstrings, hip flexors, calves. Recovery starts the moment you finish.",key:false},
      ]),
      foot("t_touch3","Technical Sharpness — Short Session","⚽","#c8a4ff",[
        {n:"Ball Work (10 min) — Feel Only",d:"Don't force it. Inside, outside, sole rolls. Just feel the ball. Nothing technical — just reconnect.",key:false},
        {n:"10 Passes Against Wall",d:"Crisp, 1-touch. Confirm your touch is sharp. That's it. Stop after 10.",key:false},
      ]),
    ]},
    // D-2: Light upper gym (40% volume) + full rest lower body
    {label:"Taper D-2 — Light Upper + Rest", type:"gym", blocks:[
      prehab(),
      gym("t_upper2","Upper Body Only — 40% Volume, Full Intensity","💪","#9b72cf",
        ["bench","pullup","ohp","extrot"]),
      foot("t_rest2","Lower Body Rest + Nutrition","💧","#00bcd4",[
        {n:"Zero Lower Body Work",d:"Legs are resting. No squats, no running, no jumping. Upper body only today. The legs are storing energy.",key:true},
        {n:"Carb Top-Up Meal",d:"High carb, moderate protein, low fat. Rice or pasta base. Something your body knows — no new foods before an event.",key:true},
        {n:"Contrast Shower (Optional)",d:"2 min cold, 2 min hot, repeat × 3. Reduces inflammation, improves circulation. Leaves you feeling fresh.",key:false},
        {n:"Mental Rehearsal (10 min)",d:"Visualise the event. First sprint off the mark. First touch under pressure. First shot. Make it vivid and fast.",key:true},
      ]),
    ]},
    // D-1: Complete rest — kit prep, nutrition, sleep
    {label:`Taper D-1 — Eve of ${label}`, type:"rest", blocks:[
      prehab(),
      foot("t_eve",`Eve of ${label} — Prepare`,"🎯","#e040fb",[
        {n:"Zero Training — Complete Rest",d:"The adaptation has happened. Training today adds fatigue, not fitness. Trust every session you've done. Rest.",key:true},
        {n:"10 min Easy Walk (Optional)",d:"If you feel restless — 10 min walk only. Fresh air, loose legs, nothing more.",key:false},
        {n:"Prep Your Kit Completely",d:"Boots cleaned and broken in. Shinpads in bag. Water bottle filled. Warm-up gear packed. Nothing to think about tomorrow.",key:false},
        {n:"Pre-Event Meal Plan Confirmed",d:"Know exactly what you're eating tonight and tomorrow morning. No guessing, no new foods. Eat what fuels you.",key:true},
        {n:"Final Visualisation (15 min)",d:`See yourself at ${label}. The sprint where you accelerate past your man. The press that wins the ball. The finish that goes in. Vivid, detailed, confident.`,key:true},
        {n:"Sleep: 9–10 Hours — Non-Negotiable",d:"Phones off by 10pm. Room cool and dark. Melatonin if needed. You want to wake up tomorrow feeling like a weapon.",key:true},
      ]),
    ]},
    // D-0: Event day
    {label:`${label}`, type:"match", blocks:[
      prehab(),
      foot("t_event",`${label} — Deliver`,"🏆","#1ed760",[
        {n:"Pre-Event Meal (3hrs Before)",d:"High carb, moderate protein, low fat and fibre. Rice, chicken, banana. Something proven. Fuel the engine.",key:true},
        {n:"Dynamic Warm-Up (20 min)",d:"High knees, leg swings, banded glutes, hip circles, A-skips, B-skips. Finish with 3 × 20m accelerations. Heart rate up before you start.",key:true},
        {n:"Mental Switch-On",d:"This is what every early morning, every heavy set, every sprint rep was for. You've done the work. Now just compete.",key:true},
        {n:"DELIVER",d:`Every session this block — the gym work, the sprint sessions, the technical reps, the taper — was preparation for ${label}. Sprint harder than you think you can. Press relentlessly. Be decisive. Finish with conviction. Be the player you've been building.`,key:true},
        {n:"Post-Event: 3/2 Review",d:"3 things you executed well. 2 things to improve. Write them tonight before you forget. This is how you get better every time.",key:false},
      ]),
    ]},
  ];

  const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

  function dayNum(d) {
    return Math.floor(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()) / 86400000);
  }
  const evDayNum = dayNum(eventDate);

  return DAYS.map((day, i) => {
    const slotDate = new Date(viewedWeekMonday);
    slotDate.setDate(slotDate.getDate() + i);
    const slotDayNum = dayNum(slotDate);
    const diffDays = evDayNum - slotDayNum;
    const taperIdx = 6 - diffDays;

    if (diffDays >= 0 && diffDays <= 6) {
      const t = taperDays[taperIdx];
      return {day, label: t.label, type: t.type, blocks: t.blocks};
    } else if (diffDays < 0) {
      const daysAfter = Math.abs(diffDays);
      if (daysAfter === 1) {
        return {day, label:"Post-Event Recovery", type:"rest", blocks:[
          prehab(),
          foot("rec_t","Full Recovery Session","💧","#00bcd4",[
            {n:"Contrast Shower or Ice Bath",d:"10–15 min. Cold first. Reduces inflammation, flushes lactic acid, speeds recovery.",key:false},
            {n:"Gentle Walk 20–30 min",d:"Keep blood moving. Nothing strenuous. Loose and easy.",key:false},
            {n:"Full Body Stretch (20 min)",d:"Everything. Hips, hamstrings, calves, quads, shoulders, thoracic. You earned it.",key:true},
            {n:"Nutrition: Recovery Meal",d:"High protein (40g+), moderate carbs. Eat within 2 hours of finishing. Chocolate milk is genuinely one of the best recovery drinks.",key:true},
            {n:"Reflect on the Block",d:"What did you execute? What do you build next? Write 3 takeaways. The best players review constantly.",key:true},
          ]),
        ]};
      }
      return normalSched[i] || {day, label:"Rest", type:"rest", blocks:[]};
    } else {
      return normalSched[i] || {day, label:"Rest", type:"rest", blocks:[]};
    }
  });
}

/* ═══ SESSION-DRIVEN SCHEDULE BUILDER ════════════════════════
   The athlete's FIXED football sessions — team training (tt),
   small-sided games (ssg), matches (match) — are the core of the
   week. Everything else (strength, speed, power, recovery, rest)
   is arranged AROUND them using standard load-management rules:
     • No heavy lower-body or hard sprints the day before a game
     • Recovery the day after a match / SSG
     • Heavy legs kept as far from the key game as possible
     • Speed / power on fresh days, never straight after heavy legs
     • Prehab every day · ≥1 full rest day (≥2 in-season)
   `pattern` is a 7-slot Mon→Sun array of "" | "tt" | "ssg" | "match" | "rest".
   Returns the same shape as buildSched so it drops straight in.
═══════════════════════════════════════════════════════════ */
function buildSmartSched(phase, pattern, mwi=0, mas="") {
  const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const mw = MAS[Math.min(mwi,6)];
  const pat = (pattern && pattern.length===7) ? pattern.slice() : ["","","","","","",""];

  const prehab = () => ({id:"prehab",title:"Prehab · 15 min (Daily — Never Skip)",icon:"🛡",color:"#e8c84a",kind:"prehab"});
  const gym    = (id,title,icon,color,exIds) => ({id,title,icon,color,kind:"gym",exIds});
  const foot   = (id,title,icon,color,items) => ({id,title,icon,color,kind:"foot",items});
  const sprint = (id,title,icon,color,items) => ({id,title,icon,color,kind:"sprint",items});

  /* ── Football anchors (the fixed core) ── */
  const teamBlock = () => foot("tt","Team Training","⚽","#2d86ff",[
    {n:"Execute Your Role — Full Intensity",d:"Tactical focus. Every touch deliberate, scan before you receive, move off the ball constantly. Train like you play.",key:true},
    {n:"Log Session Intensity (1–10)",d:"Track weekly load. If team sessions are consistently 8–9, pull back gym volume the next time you re-plan the week.",key:false},
    {n:"Stay Behind: 10 Finishing Shots",d:"Both feet. Keep your finishing sharp even when the club session didn't focus on it.",key:false},
  ]);
  const ssgBlock = () => foot("ssg","Small-Sided Game (5/6/7-a-side)","🥅","#1ed760",[
    {n:"Max-Intensity SSG",d:"High pressing, quick transitions, repeated sprints. Your highest-intensity football of the week — treat it like a match.",key:true},
    {n:"Signature 1v1 Move",d:"Force your go-to move in tight space. Small pitches are the perfect lab for it.",key:false},
    {n:"Finishing Under Fatigue",d:"Finish when tired and pressured — that's match-realistic. Decisive, both feet.",key:true},
  ]);
  const matchBlock = () => foot("match","Match Day","🏆","#1ed760",[
    {n:"Pre-Match Activation (15 min)",d:"Glute activation, dynamic stretches, short accelerations, rondos. Heart rate up before kickoff.",key:true},
    {n:"PLAY — Professional Standard",d:"Press high, move sharp, win your duels, make the right pass, finish your chances.",key:true},
    {n:"Post-Match: 3/2 Review",d:"3 things you did well, 2 to improve. Write them tonight while it's fresh.",key:false},
  ]);

  /* ── Supporting blocks (phase-aware exercise pools) ── */
  const ph = phase==="offseason"?"off":phase==="preseason"?"pre":"in";
  const lowerEx = {off:["trapbar","bsquat","bss","nordic","calf"], pre:["trapbar","bss","rdl","nordic","calf"], in:["trapbar","bss","hamcurl","calf"]}[ph];
  const upperEx = {off:["bench","pullup","row","ohp","extrot"],    pre:["bench","pullup","row","ohp","extrot"],   in:["bench","pullup","row"]}[ph];
  const lowerBlock = () => gym("s_lower", phase==="inseason"?"Lower Maintenance":"Lower Strength","🏋", phase==="preseason"?"#e8c84a":"#c8a4ff", lowerEx);
  const upperBlock = () => gym("s_upper", phase==="inseason"?"Upper Maintenance":"Upper Strength","💪","#2d86ff", upperEx);
  const uniBlock   = () => gym("s_uni","Unilateral Lower","🦵","#c8a4ff",["rdl","stepup","hamcurl"]);
  const coreBlock  = (id="s_core") => gym(id,"Core Block","⬡","#9b72cf",["deadbug","plank","pallof"]);
  const powerBlock = () => gym("s_power","Power & Plyometrics","💥","#e040fb", phase==="preseason"?["boxjump","clean"]:["boxjump","broad"]);

  const maxVel = () => sprint("s_speed","Max Velocity Sprints","⚡","#1ed760",[
    {n:"6 × 10m Drive Phase",d:"Explosive starts, stay low for the first strides, full recovery between reps.",key:true},
    {n:"5 × 20m Acceleration",d:"Drive phase into upright max velocity. Walk back fully.",key:false},
    {n:"3 × 30m Max Velocity",d:"3–4 min rest. Fully relaxed at top speed — tension kills speed. Film if you can.",key:true},
  ]);
  const masSupramax = () => sprint("s_mas2a",`MAS 2a — Supramaximal · ${mw.s2a}`,"⚡","#e040fb",[
    {n:`This Week: ${mw.s2a}`,d:`120% MAS, 15s on / 15s off. ${parseFloat(mas)>0?`At ${mas} m/s your target is ${Math.round(parseFloat(mas)*1.2*15)}m per rep.`:"Enter your MAS in the MAS tab for exact distances."}`,key:true},
    {n:"Coaching cue",d:"These supramaximal sprints build your top-end engine. Treat every rep like you're being timed.",key:false},
  ]);
  const masRect = () => sprint("s_mas1",`MAS 1 — Rectangles · ${mw.rect}`,"🫁","#e040fb",[
    {n:`This Week: ${mw.rect}`,d:"100% MAS short side, 70% long side. 2 min rest. Builds the engine for 90-minute performance.",key:true},
    {n:"10s Sprint / 20s Jog × 12",d:"Target 95% max HR on every sprint effort.",key:false},
  ]);
  const speedMaint = () => sprint("s_speedm","Speed Maintenance — Don't Let It Drop","⚡","#1ed760",[
    {n:"5 × 20m Max Sprints",d:"Full recovery (3 min). In-season speed is what scouts notice — don't let it decay.",key:true},
    {n:"2 × 30m Flying Runs",d:"20m build-up into 20m max effort.",key:false},
  ]);
  const techBlock = () => foot("s_tech","Technical Football","⚽","#c8a4ff",[
    {n:"Ball Mastery + 1v1 (20 min)",d:"Tight touches both feet, signature move at match speed.",key:false},
    {n:"Finishing (10 min)",d:"Both feet, varied service. First-time where you can.",key:true},
  ]);

  const primerBlock = () => foot("primer","Match Primer — Light & Sharp","🎯","#c8a4ff",[
    {n:"Activation + 4 × 20m Strides",d:"Wake the nervous system without fatigue. Sharp, not hard.",key:true},
    {n:"Technical Touch & Finishing (15 min)",d:"Light ball work, a few finishes. Stay loose — tomorrow is the priority.",key:false},
    {n:"Mobility (10 min)",d:"Hips, ankles, hamstrings. Arrive fresh.",key:false},
  ]);
  const recoveryBlock = () => foot("recovery","Active Recovery","💧","#00bcd4",[
    {n:"Easy Walk or Swim (20–30 min)",d:"Blood flow without load. Accelerates recovery from the session before.",key:false},
    {n:"Full Mobility (20 min)",d:"Hips, hamstrings, thoracic spine, ankles. Hold everything 45–60s.",key:false},
    {n:"Nutrition: Refuel Properly",d:"Protein + carbs. Don't under-eat after hard sessions — that's when you adapt.",key:true},
  ]);
  const restBlock = () => foot("rest","Full Rest & Regeneration","🛌","#6a6a6a",[
    {n:"Complete rest or a gentle walk",d:"Zero intensity. Adaptation locks in on rest days — trust the process.",key:false},
    {n:"Sleep 9–10 hours",d:"The single biggest recovery lever. Protect it.",key:true},
  ]);

  /* ── slots Mon→Sun ── */
  const slots = DAYS.map((d)=>({day:d, role:null, label:"", type:"rest", blocks:[]}));
  const setDay = (i, role, label, type, blocks) => { slots[i] = {day:DAYS[i], role, label, type, blocks}; };
  // Stack gym/speed work onto an existing football day: gym in the MORNING,
  // the team session in the EVENING — a proper two-a-day, not a lost day.
  const stackWork = (i, label, type, work) => {
    const d = slots[i];
    const evening = d.blocks.map(b => b.kind==="foot" ? {...b, slot:"pm"} : b);
    const morning = work.map(b => ({...b, slot:"am"}));
    slots[i] = { ...d, label, type, blocks:[...evening, ...morning] };
  };

  /* 1 · place the fixed football anchors (the core) */
  for (let i=0;i<7;i++){
    if      (pat[i]==="match") setDay(i,"match","Match Day","match",[prehab(),matchBlock()]);
    else if (pat[i]==="ssg")   setDay(i,"ssg","Small-Sided Game","football",[prehab(),ssgBlock()]);
    else if (pat[i]==="tt")    setDay(i,"tt","Team Training","football",[prehab(),teamBlock()]);
    else if (pat[i]==="rest")  setDay(i,"rest","Rest Day","rest",[restBlock()]);
  }

  /* 2 · MATCH-ONLY load management — a match is the one true peak you taper into
        and recover from. Training sessions and SSGs are just part of the week's
        work, so they get NO primer before and NO forced rest after. */
  const matchDays = [...pat.keys()].filter(i=>pat[i]==="match");
  for (const m of matchDays) {
    if (m-1>=0 && pat[m-1]==="") setDay(m-1,"primer","Match Primer — Light","football",[prehab(),primerBlock()]);
    if (m+1<=6 && pat[m+1]==="") setDay(m+1,"recovery","Active Recovery (Post-Match)","rest",[prehab(),recoveryBlock()]);
  }
  // Spacing only avoids loading the eve of a hard game (match OR SSG).
  const eveOfHardGame = i => (i+1<=6) && (pat[i+1]==="match"||pat[i+1]==="ssg");
  const isMatchDay    = i => pat[i]==="match";

  /* 3 · distribute strength / speed / power.
        Consolidation: lifting goes ONTO training days where it can (high-low model
        — keep hard days hard so easy days stay genuinely easy), then onto open days.
        We always leave at least one open day free so the week keeps a true rest. */
  const heavy = new Set();                       // leg-strength days (for spacing)
  const placed = new Set();                      // days that already got supporting work
  const ins = phase==="inseason";

  // Per-item spec: cons = where it may stack ("legs"→team days, "upper"→team/ssg, "none"→open only)
  const ITEM = {
    lower:   { cons:"legs",  heavy:true,  type:"gym",            label: ins?"Lower Maintenance":"Lower Strength",     blocks:[lowerBlock(), coreBlock()] },
    uni:     { cons:"legs",  heavy:true,  type:"gym",            label:"Unilateral Lower + Core",                     blocks:[uniBlock(), coreBlock()] },
    upper:   { cons:"upper", heavy:false, type:"gym",            label: ins?"Upper Maintenance":"Upper Strength",     blocks:[upperBlock(), coreBlock()] },
    power:   { cons:"none",  heavy:false, type:"gym",            label:"Power & Plyometrics",                         blocks:[powerBlock(), coreBlock()] },
    maxVel:  { cons:"none",  heavy:false, type:"sprint",         label:"Max Velocity Sprints",                        blocks:[maxVel()] },
    speed:   { cons:"none",  heavy:false, type:"sprint",         label:"Speed Maintenance",                           blocks:[speedMaint()] },
    masSupra:{ cons:"none",  heavy:false, type:"football+sprint",label:"Supramaximal MAS + Technical",                blocks:[masSupramax(), techBlock()] },
  };
  const Q = {
    offseason: ["lower","maxVel","upper","masSupra","uni","power"],
    preseason: ["lower","masSupra","upper","maxVel","uni","power"],
    inseason:  ["lower","speed","upper"],
  }[phase] || [];

  const openDays = () => [...slots.keys()].filter(i=>slots[i].role===null && !placed.has(i));
  const ttDays   = () => [...slots.keys()].filter(i=>slots[i].role==="tt"  && !placed.has(i));
  const ssgDays  = () => [...slots.keys()].filter(i=>slots[i].role==="ssg" && !placed.has(i));
  let openBudget = Math.max(0, openDays().length - 1); // reserve ≥1 open day for rest

  for (const item of Q) {
    const spec = ITEM[item];
    const okGym = (i) => {
      if (eveOfHardGame(i)) return false;                       // keep the eve of a match/SSG light
      if (spec.heavy && (heavy.has(i-1)||heavy.has(i+1))) return false; // no back-to-back heavy legs
      return true;
    };
    const okSpeed = (i) => {
      if (eveOfHardGame(i)) return false;                       // no hard sprints before a hard game
      if (heavy.has(i-1)) return false;                         // not the day after heavy legs
      return true;
    };
    const isSpeed = spec.type.includes("sprint");
    const ok = isSpeed ? okSpeed : okGym;

    // candidate days in priority order
    let cands = [];
    if (spec.cons==="legs")  cands = [...ttDays(), ...openDays()];            // legs: team day, else open
    else if (spec.cons==="upper") cands = [...ttDays(), ...ssgDays(), ...openDays()];
    else                     cands = [...openDays()];                        // speed/power/mas: open only

    // honour the reserved-rest budget for OPEN days
    const pick = cands.find(i => ok(i) && (slots[i].role!==null || openBudget>0)) ??
                 cands.find(i =>            (slots[i].role!==null || openBudget>0));
    if (pick==null) continue;                                   // no room — drop this item this week

    placed.add(pick);
    if (spec.heavy) heavy.add(pick);
    const onFootball = slots[pick].role==="tt" || slots[pick].role==="ssg";
    if (onFootball) {
      const base = slots[pick].role==="ssg" ? "Small-Sided Game" : "Team Training";
      stackWork(pick, `${base} + ${spec.label}`, `football+${spec.type.replace("football+","")}`, spec.blocks);
    } else {
      openBudget -= 1;
      setDay(pick, isSpeed?"sprint":"gym", spec.label, spec.type, [prehab(), ...spec.blocks]);
    }
  }

  /* 4 · leftover open days → exactly ONE true rest day (placed where it spaces best),
        any others become light active recovery (never forced full rest after a session) */
  const leftover = [...slots.keys()].filter(i=>slots[i].role===null);
  if (leftover.length) {
    const hardDays = [...slots.keys()].filter(i => isMatchDay(i) || slots[i].role==="ssg" || heavy.has(i));
    const spacing = i => hardDays.length ? Math.min(...hardDays.map(h=>Math.min(Math.abs(i-h),7-Math.abs(i-h)))) : 99;
    leftover.sort((a,b)=> spacing(b)-spacing(a) || a-b);        // rest lands furthest from hard days
    setDay(leftover[0],"rest","Rest Day","rest",[restBlock()]);
    for (const i of leftover.slice(1)) setDay(i,"recovery","Active Recovery","rest",[prehab(), recoveryBlock()]);
  }

  return slots.map(s => ({day:s.day, label:s.label, type:s.type, blocks:s.blocks}));
}
const _lsListeners = new Map(); // key → Set of setState fns
function useLS(k, d) {
  const [v, sv] = useState(() => {
    try { const x = localStorage.getItem(k); return x ? JSON.parse(x) : d; } catch { return d; }
  });
  // Re-read from localStorage whenever k changes (e.g. switching days changes activeDateKey)
  useEffect(() => {
    try {
      const x = localStorage.getItem(k);
      sv(x ? JSON.parse(x) : d);
    } catch { sv(d); }
  }, [k]); // eslint-disable-line react-hooks/exhaustive-deps
  // Register this component as a listener for key k
  useEffect(() => {
    if (!_lsListeners.has(k)) _lsListeners.set(k, new Set());
    _lsListeners.get(k).add(sv);
    return () => { _lsListeners.get(k)?.delete(sv); };
  }, [k]);
  const set = useCallback(x => {
    try { localStorage.setItem(k, JSON.stringify(x)); } catch {}
    // Notify all components subscribed to this key
    _lsListeners.get(k)?.forEach(fn => fn(x));
  }, [k]);
  return [v, set];
}
function tc(t) {
  const m={gym:"#2d86ff",football:"#a78bfa",sprint:"#1ed760",vo2:"#e040fb",recovery:"#00bcd4",rest:"#6a6a6a",match:"#1ed760",prehab:"#e8c84a"};
  return m[t]||"#6a6a6a";
}
function tl(t) {
  const m={gym:"GYM",football:"BALL",sprint:"SPRINT",vo2:"VO₂",recovery:"REST",rest:"REST",match:"MATCH",prehab:"REHAB"};
  return m[t]||t.toUpperCase();
}
function dayNut(blocks) {
  // blocks = the actual visible blocks for the day (after overrides)
  const hasGym    = blocks.some(b => b.kind === "gym");
  const hasSprint = blocks.some(b => b.kind === "sprint");
  const hasFoot   = blocks.some(b => b.kind === "foot");
  const hasAny    = hasGym || hasSprint || hasFoot;
  if (!hasAny)                   return {kcal:"2150",         c:"#6a6a6a"};
  if (hasGym && hasSprint)       return {kcal:"2450–2550",    c:"#ff6b35"};
  if (hasGym || hasSprint)       return {kcal:"2300–2400",    c:"#1ed760"};
  return                                {kcal:"2200–2300",    c:"#e8c84a"};
}
function warn(s,i) {
  const d=s[i],p=s[i-1],pp=s[i-2];
  const h=x=>x&&!x.type.startsWith("rest");
  if(h(d)&&h(p)&&h(pp)) return {l:"orange",m:"3 hard days in a row — consider shifting rest"};
  if(d.type.includes("gym")&&p?.type==="match") return {l:"red",m:"Gym after match — high injury risk"};
  return null;
}

function Prog({val,target}) {
  const t=parseFloat(target), v=parseFloat(val);

  const pct=Math.min(100,Math.round((v/t)*100));

const BlockSec = memo(function BlockSec({block,phase,logs,setLogs,dayIdx,phaseKey,weight,position,tgtLogs,setTgtLogs,taper}) {
  const [open,setOpen]=useState(false);
  // Reset open state when block changes (day switch)
  const prevBlockId = useRef(block.id);
  useEffect(() => {
    if (prevBlockId.current !== block.id) {
      setOpen(false);
      prevBlockId.current = block.id;
    }
  }, [block.id]);
  const bk=`${phase}_${dayIdx}_${block.id}`;

  const done = useMemo(() => {
    if(block.kind==="prehab") return !!(logs[`prehab_${bk}`]||{}).done;
    if(block.kind==="gym") {
      let sel=block.exIds||[];
      try{const saved=localStorage.getItem(`gsel_${phaseKey}_${dayIdx}_${block.id}`);if(saved)sel=JSON.parse(saved);}catch{}
      if(!sel.length) return false;
      return sel.every(id=>{
        const k=`ex_${phase}_${id}`;
        const setsLog=logs[k];
        if(!Array.isArray(setsLog)||setsLog.length===0) return false;
        return setsLog.every(s=>s.done);
      });
    }
    if(block.kind==="foot") {
      const items=block.items||[];
      if(!items.length) return false;
      return items.every(it=>{const k=`fi_${bk}_${(it.n||"").slice(0,14).replace(/\W/g,"_")}`;return !!(logs[k]||{}).done;});
    }
    if(block.kind==="sprint") {
      const items=block.items||[];
      if(!items.length) return false;
      return items.every(it=>{const k=`sp_${bk}_${(it.n||"").slice(0,14).replace(/\W/g,"_")}`;return !!(logs[k]||{}).done;});
    }
    return false;
  }, [block, bk, logs, phase, phaseKey, dayIdx]);

  // Auto-close session block when it becomes fully done
  const prevDone = useRef(false);
  useEffect(() => {
    if (done && !prevDone.current) setOpen(false);
    prevDone.current = done;
  }, [done]);

  return (
    <div className="sec" style={{borderColor:done?"rgba(30,215,96,.45)":`${block.color}20`,background:done?"rgba(30,215,96,.04)":undefined,transition:"all .3s"}}>
      <button className="sec-hdr" onClick={()=>setOpen(o=>!o)}>
        <span className="handle" title="Drag to another day">⠿⠿</span>
        <span style={{fontSize:15}}>{block.icon}</span>
        <span style={{flex:1,fontFamily:"var(--font)",fontSize:13,fontWeight:700,color:done?"#1ed760":block.color,letterSpacing:".02em"}}>{done?"✓ ":""}{block.title}</span>
        <span style={{color:"var(--grey2)",fontSize:18,display:"inline-block",transition:"transform .25s",transform:open?"rotate(0)":"rotate(-90deg)"}}>⌄</span>
      </button>
      <div className={`cl ${open?"open":"shut"}`}>
        <div style={{padding:"2px 15px 14px"}}>
          {block.kind==="prehab"&&<PrehabBlock bk={bk} logs={logs} setLogs={setLogs}/>}
          {block.kind==="gym"&&<GymBlock block={block} phase={phase} logs={logs} setLogs={setLogs} dayIdx={dayIdx} phaseKey={phaseKey} weight={weight} position={position} tgtLogs={tgtLogs} setTgtLogs={setTgtLogs} taper={taper}/>}
          {block.kind==="foot"&&block.items?.length>0&&block.items.map((it,i)=><FootItem key={i} item={it} bk={bk} logs={logs} setLogs={setLogs}/>)}
          {block.kind==="sprint"&&block.items?.length>0&&block.items.map((it,i)=><SprintItem key={i} item={it} bk={bk} logs={logs} setLogs={setLogs}/>)}
          {/* Custom block (no items) — manual completion tick */}
          {(block.kind==="foot"||block.kind==="sprint")&&(!block.items||block.items.length===0)&&(()=>{
            const ck=`custom_done_${bk}`;
            const isDone=!!(logs[ck]||{}).done;
            return (
              <button onClick={()=>setLogs({...logs,[ck]:{done:!isDone}})} style={{
                display:"flex",alignItems:"center",gap:10,width:"100%",padding:"12px 0",
                background:"none",border:"none",cursor:"pointer",textAlign:"left"
              }}>
                <div style={{
                  width:22,height:22,borderRadius:6,border:`2px solid ${isDone?"#1ed760":"var(--border2)"}`,
                  background:isDone?"#1ed760":"transparent",display:"flex",alignItems:"center",
                  justifyContent:"center",flexShrink:0,transition:"all .18s"
                }}>
                  {isDone&&<span style={{color:"#000",fontSize:13,fontWeight:900,lineHeight:1}}>✓</span>}
                </div>
                <span style={{fontSize:13,fontWeight:700,color:isDone?"#1ed760":"#b3b3b3",
                  fontFamily:"var(--fontb)",transition:"color .18s"}}>
                  {isDone?"Session complete":"Mark as complete"}
                </span>
              </button>
            );
          })()}
        </div>
      </div>
    </div>
  );
});

function SessionManagerModal({day, dayIdx, phase, activeDateKey, sched, activeSetSched, storedSched, weekDates, onClose}) {
  const [action, setAction] = useState(null);
  const [scope,  setScope]  = useState(null);
  const [picked, setPicked] = useState(null);
  const [moveTo, setMoveTo] = useState(null); // target dayIdx for move
  const [moveScope, setMoveScope] = useState(null); // "today" | "always"
  const [customMode, setCustomMode] = useState(false);
  const [customName, setCustomName] = useState("");
  const [customEmoji, setCustomEmoji] = useState("📋");
  const [customSlot, setCustomSlot] = useState("am");
  const [ovs, setOvs] = useLS(`dayov_${activeDateKey}`, {added:[], removed:[]});

  const AM_KINDS     = new Set(["prehab","sprint","foot"]);
  const todayAdded   = ovs.added || [];
  const todayRemoved = new Set(ovs.removed || []);
  const storedDay    = storedSched ? storedSched.find(d => d.day === day.day) : null;
  const permAdded    = storedDay?.permAdded  || [];
  const permRemoved  = new Set(storedDay?.permRemoved || []);
  const allVisible   = [
    ...(day.blocks||[]).filter(b => !permRemoved.has(b.id)),
    ...permAdded,
    ...todayAdded,
  ].filter(b => !todayRemoved.has(b.id));

  function buildBlock(key, id) {
    if (customMode) {
      return {id, title: customName.trim() || "Custom Session", icon: customEmoji,
              color:"#b3b3b3", kind:"foot", slot: customSlot, items:[], custom:true};
    }
    const preset = BLOCK_PRESETS.flatMap(g => g.items).find(p => p.key === key);
    if (!preset) return null;
    const block = {...preset, id};
    delete block.key; delete block.group;
    return block;
  }
  function doAddToday() {
    const block = buildBlock(picked, (picked||"custom") + "_" + Date.now());
    if (!block) return;
    setOvs({...ovs, added: [...(ovs.added||[]), block]});
    onClose();
  }
  function doRemoveToday() {
    if (!picked) return;
    const wasAddedToday = todayAdded.some(b => b.id === picked);
    if (wasAddedToday) {
      // Just splice it out of ovs.added — no need to add to removed
      setOvs({...ovs, added: todayAdded.filter(b => b.id !== picked)});
    } else {
      setOvs({...ovs, removed: [...(ovs.removed||[]), picked]});
    }
    onClose();
  }
  function doAddAlways() {
    const block = buildBlock(picked, (picked||"custom") + "_perm_" + Date.now());
    if (!block) return;
    const base = storedSched || sched.map(d => ({day:d.day}));
    const newStored = base.map((d, i) => {
      if (i !== dayIdx) return d;
      return {...d, permAdded: [...(d.permAdded||[]), block]};
    });
    activeSetSched(newStored);
    onClose();
  }
  function doRemoveAlways() {
    if (!picked) return;
    const base = storedSched || sched.map(d => ({day:d.day}));
    const newStored = base.map((d, i) => {
      if (i !== dayIdx) return d;
      const wasPermAdded = (d.permAdded||[]).some(b => b.id === picked);
      if (wasPermAdded) {
        return {...d, permAdded: (d.permAdded||[]).filter(b => b.id !== picked)};
      }
      return {...d, permRemoved: [...(d.permRemoved||[]), picked]};
    });
    activeSetSched(newStored);
    onClose();
  }

  const Btn = ({onClick, emoji, title, sub}) => (
    <button onClick={onClick} style={{width:"100%",padding:"14px 16px",borderRadius:12,
      border:"1.5px solid var(--border2)",background:"var(--card2)",display:"flex",
      alignItems:"center",gap:12,textAlign:"left",color:"#f5f5f5",marginBottom:8,transition:"all .15s"}}>
      <span style={{fontSize:22}}>{emoji}</span>
      <div><div style={{fontWeight:700,fontSize:13}}>{title}</div>
        <div style={{fontSize:11,color:"#6a6a6a",marginTop:2}}>{sub}</div></div>
    </button>
  );
  const Back = ({to}) => (
    <button onClick={to} style={{background:"none",border:"none",color:"#5a5a5a",
      fontSize:12,fontFamily:"var(--fontb)",marginBottom:14,display:"flex",alignItems:"center",gap:4}}>← Back</button>
  );

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{maxHeight:"88vh",overflowY:"auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
          <span style={{fontSize:20}}>⚙</span>
          <div style={{flex:1}}>
            <div style={{fontFamily:"var(--font)",fontSize:15,fontWeight:900}}>Manage Sessions</div>
            <div style={{fontSize:11,color:"#6a6a6a",fontFamily:"var(--fontb)",marginTop:2}}>{day.day} — {day.label}</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#5a5a5a",fontSize:22,lineHeight:1}}>✕</button>
        </div>

        {!action && <>
          <div style={{fontSize:10,color:"#6a6a6a",fontWeight:800,letterSpacing:".12em",marginBottom:10}}>WHAT DO YOU WANT TO DO?</div>
          <Btn onClick={()=>setAction("add")}    emoji="➕" title="Add a session"    sub="Add a block to this day"/>
          <Btn onClick={()=>setAction("remove")} emoji="🗑" title="Remove a session" sub="Remove a block from this day"/>
          <Btn onClick={()=>setAction("move")}   emoji="↔️" title="Move a session"   sub="Move a block to another day"/>
        </>}

        {action==="move" && <>
          <Back to={()=>{setAction(null);setPicked(null);setMoveTo(null);setMoveScope(null);}}/>
          <div style={{fontSize:10,color:"#6a6a6a",fontWeight:800,letterSpacing:".12em",marginBottom:10}}>PICK BLOCK TO MOVE</div>
          {allVisible.map(b=>(
            <button key={b.id} onClick={()=>{setPicked(b.id);setMoveTo(null);setMoveScope(null);}} style={{
              width:"100%",padding:"12px 14px",borderRadius:10,marginBottom:6,
              border:`1.5px solid ${picked===b.id?"#c8a4ff":"var(--border)"}`,
              background:picked===b.id?"rgba(200,164,255,.08)":"var(--card2)",
              display:"flex",alignItems:"center",gap:10,textAlign:"left",color:"#f5f5f5",transition:"all .15s"
            }}>
              <span style={{fontSize:16}}>{b.icon}</span>
              <div style={{flex:1,fontSize:12,fontWeight:700,color:picked===b.id?"#c8a4ff":b.color}}>{b.title}</div>
              {picked===b.id&&<span style={{color:"#c8a4ff"}}>✓</span>}
            </button>

          {picked && <>
            <div style={{fontSize:10,color:"#6a6a6a",fontWeight:800,letterSpacing:".12em",margin:"14px 0 8px"}}>MOVE TO WHICH DAY?</div>

                <button key={i} onClick={()=>{setMoveTo(i);setMoveScope(null);}} style={{

              </div>

                  // This week only — remove from today's ovs, add to target day's ovs
                  const block = allVisible.find(b=>b.id===picked);
                  if (!block) return;
                  // Remove from this day today
                  const wasAddedToday = todayAdded.some(b=>b.id===picked);
                  if (wasAddedToday) setOvs({...ovs, added: todayAdded.filter(b=>b.id!==picked)});
                  else setOvs({...ovs, removed:[...(ovs.removed||[]),picked]});
                  // Add to target day today
                  if (weekDates) {
                    const targetKey = weekDates[moveTo]?.toISOString?.()?.slice(0,10);
                    if (targetKey) {
                      try {
                        const tov = JSON.parse(localStorage.getItem(`dayov_${targetKey}`)||"{}");
                        tov.added = [...(tov.added||[]), block];
                        localStorage.setItem(`dayov_${targetKey}`, JSON.stringify(tov));
                      } catch {}
                    }
                  }
                  onClose();
                }} style={{flex:1,padding:12,borderRadius:10,border:"1.5px solid #c8a4ff",
                  background:"rgba(200,164,255,.1)",color:"#c8a4ff",fontWeight:800,fontSize:12,fontFamily:"var(--font)"}}>
                  📅 This week
                </button>
                <button onClick={()=>{
                  // Every week — use permAdded/permRemoved on stored sched
                  const block = allVisible.find(b=>b.id===picked);
                  if (!block) return;
                  const base = storedSched || sched.map(d=>({day:d.day}));
                  const updated = base.map((d,i)=>{
                    if (i===dayIdx) {
                      const wasPermAdded=(d.permAdded||[]).some(b=>b.id===picked);
                      if (wasPermAdded) return {...d, permAdded:(d.permAdded||[]).filter(b=>b.id!==picked)};
                      return {...d, permRemoved:[...(d.permRemoved||[]),picked]};
                    }
                    if (i===moveTo) return {...d, permAdded:[...(d.permAdded||[]),block]};
                    return d;
                  });
                  activeSetSched(updated);
                  onClose();
                }} style={{flex:1,padding:12,borderRadius:10,border:"1.5px solid #1ed760",
                  background:"rgba(30,215,96,.08)",color:"#1ed760",fontWeight:800,fontSize:12,fontFamily:"var(--font)"}}>
                  🔁 Every week
                </button>
              </div>
            </>}
          </>}
        </>}

        {action==="add" && !scope && <>
          <Back to={()=>{ setAction(null); setCustomMode(false); setCustomName(""); }}/>
          <div style={{fontSize:10,color:"#6a6a6a",fontWeight:800,letterSpacing:".12em",marginBottom:10}}>APPLY TO…</div>
          <Btn onClick={()=>setScope("today")}  emoji="📅" title="Today only"  sub={`One-off for ${activeDateKey}`}/>
          <Btn onClick={()=>setScope("always")} emoji="🔁" title="Every week"  sub={`Permanently add to ${day.day}`}/>
        </>}

        {action==="add" && scope && <>
          <Back to={()=>{ setScope(null); setCustomMode(false); setCustomName(""); setPicked(null); }}/>
          <div style={{fontSize:10,color:"#6a6a6a",fontWeight:800,letterSpacing:".12em",marginBottom:12}}>CHOOSE A BLOCK TO ADD</div>
          {!customMode && <>
            {BLOCK_PRESETS.map(grp => (
              <div key={grp.group} style={{marginBottom:14}}>
                <div style={{fontSize:9,color:"#4a4a4a",fontWeight:800,letterSpacing:".12em",marginBottom:6}}>{grp.group.toUpperCase()}</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {grp.items.map(p => (
                    <button key={p.key} onClick={()=>setPicked(p.key)} style={{
                      padding:"7px 13px",borderRadius:20,fontSize:11,fontWeight:700,
                      border:`1.5px solid ${picked===p.key?p.color:"var(--border2)"}`,
                      background:picked===p.key?`${p.color}18`:"var(--card2)",
                      color:picked===p.key?p.color:"#aaa",transition:"all .15s"
                    }}>{p.icon} {p.title}</button>
                  ))}
                </div>
              </div>
            ))}
            {picked && <div style={{fontSize:10,color:"#6a6a6a",fontFamily:"var(--fontb)",marginBottom:10}}>
              Adds to <strong style={{color:"#f5f5f5"}}>{BLOCK_PRESETS.flatMap(g=>g.items).find(p=>p.key===picked)?.slot==="am"?"☀ AM":"🌙 PM"}</strong>
            </div>}
            {/* Divider + Write your own */}
            <div style={{display:"flex",alignItems:"center",gap:8,margin:"10px 0 10px"}}>
              <div style={{flex:1,height:1,background:"var(--border)"}}/>
              <span style={{fontSize:10,color:"#4a4a4a",fontFamily:"var(--fontb)",fontWeight:700,letterSpacing:".08em"}}>OR</span>
              <div style={{flex:1,height:1,background:"var(--border)"}}/>
            </div>
            <button onClick={()=>{ setCustomMode(true); setPicked(null); }} style={{
              width:"100%",padding:"12px 14px",borderRadius:10,marginBottom:12,
              border:"1.5px dashed var(--border2)",background:"transparent",
              color:"#6a6a6a",fontSize:12,fontWeight:700,fontFamily:"var(--font)",
              display:"flex",alignItems:"center",gap:8,justifyContent:"center",transition:"all .15s"
            }}>✏️ Write your own session</button>
          </>}

          {customMode && <>
            <button onClick={()=>setCustomMode(false)} style={{background:"none",border:"none",color:"#5a5a5a",
              fontSize:12,fontFamily:"var(--fontb)",marginBottom:14,display:"flex",alignItems:"center",gap:4}}>← Back to presets</button>
            <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:14}}>
              <label>
                <div style={{fontSize:10,color:"#6a6a6a",fontWeight:800,letterSpacing:".12em",marginBottom:5,fontFamily:"var(--font)"}}>SESSION NAME</div>
                <input className="inp" value={customName} onChange={e=>setCustomName(e.target.value)}
                  placeholder="e.g. Swim Session, Yoga, Bike Ride…" style={{width:"100%"}}/>
              </label>
              <label>
                <div style={{fontSize:10,color:"#6a6a6a",fontWeight:800,letterSpacing:".12em",marginBottom:5,fontFamily:"var(--font)"}}>EMOJI</div>
                <input className="inp" value={customEmoji} onChange={e=>setCustomEmoji(e.target.value)}
                  placeholder="📋" maxLength={2} style={{width:60,textAlign:"center",fontSize:18}}/>
              </label>
              <label>
                <div style={{fontSize:10,color:"#6a6a6a",fontWeight:800,letterSpacing:".12em",marginBottom:5,fontFamily:"var(--font)"}}>SLOT</div>
                <div style={{display:"flex",gap:6}}>
                  {[["am","☀ AM"],["pm","🌙 PM"]].map(([val,lbl])=>(
                    <button key={val} onClick={()=>setCustomSlot(val)} style={{
                      flex:1,padding:"8px 0",borderRadius:8,fontSize:12,fontWeight:700,border:"1.5px solid",
                      borderColor:customSlot===val?"#c8a4ff":"var(--border2)",
                      background:customSlot===val?"rgba(200,164,255,.12)":"var(--card2)",
                      color:customSlot===val?"#c8a4ff":"#6a6a6a",transition:"all .15s"

                  ))}
                </div>

          <button onClick={scope==="today"?doAddToday:doAddAlways}
            disabled={customMode ? !customName.trim() : !picked}
            style={{width:"100%",padding:13,borderRadius:12,fontWeight:900,fontSize:13,border:"none",
              background:(customMode ? customName.trim() : picked)?"#c8a4ff":"#1e1e1e",
              color:(customMode ? customName.trim() : picked)?"#000":"#4a4a4a",transition:"all .2s"}}>
            {scope==="today"?"Add to Today →":"Add Every Week →"}
          </button>
        </>}

        {action==="remove" && !scope && <>
          <Back to={()=>setAction(null)}/>
          <div style={{fontSize:10,color:"#6a6a6a",fontWeight:800,letterSpacing:".12em",marginBottom:10}}>APPLY TO…</div>
          <Btn onClick={()=>setScope("today")}  emoji="📅" title="Today only" sub={`Skip for ${activeDateKey} only`}/>
          <Btn onClick={()=>setScope("always")} emoji="🔁" title="Every week"  sub={`Permanently remove from ${day.day}`}/>
        </>}

        {action==="remove" && scope && <>
          <Back to={()=>setScope(null)}/>
          <div style={{fontSize:10,color:"#6a6a6a",fontWeight:800,letterSpacing:".12em",marginBottom:10}}>CHOOSE BLOCK TO REMOVE</div>
          {allVisible.length===0 && <div style={{color:"#5a5a5a",fontSize:12,padding:"8px 0"}}>No blocks on this day.</div>}
          {allVisible.map(b => {
            const isToday = todayAdded.some(x => x.id === b.id);
            const isPerm  = permAdded.some(x => x.id === b.id);
            return (
              <button key={b.id} onClick={()=>setPicked(b.id)} style={{
                width:"100%",padding:"12px 14px",borderRadius:10,marginBottom:6,
                border:`1.5px solid ${picked===b.id?"#e8274b":"var(--border)"}`,
                background:picked===b.id?"rgba(232,39,75,.08)":"var(--card2)",

              }}>
                <span style={{fontSize:16}}>{b.icon}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,fontWeight:700,color:picked===b.id?"#e8274b":b.color}}>

                    {isToday && <span style={{color:"#1ed760",fontSize:10,marginLeft:6}}>✦ added today</span>}
                    {isPerm  && <span style={{color:"#e8c84a",fontSize:10,marginLeft:6}}>✦ added weekly</span>}
                  </div>
                  <div style={{fontSize:10,color:"#5a5a5a",fontFamily:"var(--fontb)",marginTop:2}}>
                    {AM_KINDS.has(b.kind)?"☀ AM":"🌙 PM"} slot
                  </div>
                </div>
                {picked===b.id && <span style={{color:"#e8274b"}}>✕</span>}

          <button onClick={scope==="today"?doRemoveToday:doRemoveAlways} disabled={!picked}
            style={{marginTop:4,width:"100%",padding:13,borderRadius:12,fontWeight:900,fontSize:13,border:"none",
              background:picked?"#e8274b":"#1e1e1e",color:picked?"#fff":"#4a4a4a",transition:"all .2s"}}>

          </button>

/* ── DAY DETAIL ─────────────────────────────────────────── */
function DayDetail({day,dayIdx,phase,phaseColor,logs,setLogs,sched,mwi,weight,position,tgtLogs,setTgtLogs,activeDateKey,activeSetSched,storedSched,weekDates,taper}) {
  const mw  = MAS[Math.min(mwi,6)];
  const w   = warn(sched,dayIdx);
  const types  = day.type.split("+");
  const hasMAS = day.type.includes("sprint")||day.type.includes("vo2");
  const [showMgr, setShowMgr] = useState(false);

  // Reactive overrides — shared useLS means modal writes update this instantly
  const [ovs, setOvs] = useLS(`dayov_${activeDateKey}`, {added:[], removed:[]});
  const removedIds = useMemo(() => new Set(ovs.removed||[]), [ovs]);

  // Split base blocks into AM / PM — respects slotOverrides and explicit slot flag
  const AM_KINDS = useMemo(() => new Set(["prehab","sprint","foot"]), []);
  const baseBlocks = day.blocks || [];
  const slotOf = (b) => {
    const over = (ovs.slotOverrides||{})[b.id];
    if (over) return over;
    if (b.slot === "pm") return "pm";
    return AM_KINDS.has(b.kind) ? "am" : "pm";
  };
  const baseAm = useMemo(() => baseBlocks.filter(b => slotOf(b)==="am"), [baseBlocks, ovs, AM_KINDS]);
  const basePm = useMemo(() => baseBlocks.filter(b => slotOf(b)==="pm"), [baseBlocks, ovs, AM_KINDS]);

  // Merge overrides
  const visAm = useMemo(() =>
    [...baseAm, ...(ovs.added||[]).filter(b => b.slot==="am")].filter(b => !removedIds.has(b.id)),
    [baseAm, ovs, removedIds]);
  const visPm = useMemo(() =>
    [...basePm, ...(ovs.added||[]).filter(b => b.slot!=="am")].filter(b => !removedIds.has(b.id)),
    [basePm, ovs, removedIds]);

  // Calorie target — reacts to actual visible blocks (including overrides)
  const nut = useMemo(() => dayNut([...visAm, ...visPm]), [visAm, visPm]);

  // Local display order (reorder-only, not persisted)
  const [amOrder, setAmOrder] = useState([]);
  const [pmOrder, setPmOrder] = useState([]);
  useEffect(() => { setAmOrder(visAm); }, [visAm]);
  useEffect(() => { setPmOrder(visPm); }, [visPm]);

  // Drag across both slots
  const dragSrc   = useRef(null);
  const dragMoved = useRef(false);
  const [dragState, setDragState] = useState(null);

  function onHandleStart(e, slot, idx) {
    if (!e.target.closest('.handle')) return;
    e.stopPropagation();
    dragSrc.current = {slot, idx};
    dragMoved.current = false;
    setDragState({slot, idx});
  }
  function onHandleMove(e) {
    if (!dragSrc.current) return;
    e.preventDefault();
    dragMoved.current = true;
    const t = e.touches[0];
    const el = document.elementFromPoint(t.clientX, t.clientY);
    const wrap = el?.closest('.block-drag-wrap');
    document.querySelectorAll('.block-drag-wrap').forEach(w => w.classList.remove('dov-block'));
    if (wrap) wrap.classList.add('dov-block');
  }
  function onHandleEnd(e) {
    if (!dragSrc.current) return;
    const src = dragSrc.current;
    dragSrc.current = null;
    setDragState(null);
    document.querySelectorAll('.block-drag-wrap').forEach(w => w.classList.remove('dov-block'));
    if (!dragMoved.current) return;
    dragMoved.current = false;
    const t = e.changedTouches[0];
    const el = document.elementFromPoint(t.clientX, t.clientY);
    const wrap = el?.closest('.block-drag-wrap');
    if (!wrap) return;
    const tSlot = wrap.dataset.slot;
    const tIdx  = parseInt(wrap.dataset.idx);
    if (!tSlot || isNaN(tIdx)) return;
    if (tSlot === src.slot && tIdx !== src.idx) {
      // Reorder within same slot
      if (src.slot === "am") { const nb=[...amOrder]; const[m]=nb.splice(src.idx,1); nb.splice(tIdx,0,m); setAmOrder(nb); }
      else                   { const nb=[...pmOrder]; const[m]=nb.splice(src.idx,1); nb.splice(tIdx,0,m); setPmOrder(nb); }
    } else if (tSlot !== src.slot) {
      // Moving between slots — persist to ovs so it survives app restarts
      const moving = src.slot === "am" ? amOrder[src.idx] : pmOrder[src.idx];
      if (!moving) return;
      const newSlotOverrides = {...(ovs.slotOverrides||{}), [moving.id]: tSlot};
      // Also update slot on any added override entry
      const updatedAdded = (ovs.added||[]).map(b => b.id===moving.id ? {...b, slot:tSlot} : b);
      setOvs({...ovs, slotOverrides: newSlotOverrides, added: updatedAdded});
      // Update local order state
      if (src.slot === "am") {
        const na=[...amOrder]; const[m]=na.splice(src.idx,1);
        const np=[...pmOrder]; np.splice(tIdx,0,{...m,slot:tSlot});
        setAmOrder(na); setPmOrder(np);
      } else {
        const np=[...pmOrder]; const[m]=np.splice(src.idx,1);
        const na=[...amOrder]; na.splice(tIdx,0,{...m,slot:tSlot});
        setPmOrder(np); setAmOrder(na);
      }
    }
  }

  function renderList(blocks, slot) {
    return blocks.map((b, bi) => (
      <div key={`${b.id}_${slot}_${bi}`}
        className={`block-drag-wrap${dragState?.slot===slot&&dragState?.idx===bi?" dsrc":""}`}
        data-slot={slot} data-idx={String(bi)}
        onTouchStart={e => onHandleStart(e, slot, bi)}
        onTouchMove={onHandleMove}
        onTouchEnd={onHandleEnd}>
        <BlockSec block={b} phase={phase} logs={logs} setLogs={setLogs}
          dayIdx={dayIdx} phaseKey={phase} weight={weight} position={position}
          tgtLogs={tgtLogs} setTgtLogs={setTgtLogs} taper={taper}/>
      </div>
    ));
  }

  const POSFOCUS = {
    CAM:"Focus: movement between lines, third-man runs, quick combinations, finishing",
    CM: "Focus: box-to-box engine, winning second balls, progressive passing, press resistance",
    CDM:"Focus: positioning, intercepting, recycling possession, screen the back four",
    ST: "Focus: movement in behind, hold-up play, clinical finishing, aerial threat",
    LW: "Focus: 1v1 directness, crossing quality, cutting inside onto strong foot, pace in behind",
    RW: "Focus: 1v1 directness, crossing quality, cutting inside onto strong foot, pace in behind",
    CB: "Focus: aerial dominance, stepping out aggressively, ball out from back, defensive shape",
    LB: "Focus: overlapping runs, defensive positioning, crossing, recovery pace",
    RB: "Focus: overlapping runs, defensive positioning, crossing, recovery pace",
    GK: "Focus: distribution under pressure, positioning, commanding the box, shot-stopping angles",
  };

  return (
    <div className="fade">
      {showMgr && <SessionManagerModal
        day={day} dayIdx={dayIdx} phase={phase}
        activeDateKey={activeDateKey} sched={sched} activeSetSched={activeSetSched}
        storedSched={storedSched} weekDates={weekDates}
        onClose={() => setShowMgr(false)}/>}

      {/* Day banner */}
      <div style={{background:`linear-gradient(135deg,${phaseColor}12,transparent 70%)`,
        border:`1.5px solid ${phaseColor}25`,borderRadius:14,padding:"18px 20px",marginBottom:12}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
          <div>
            <div style={{fontSize:10,color:phaseColor,fontWeight:800,letterSpacing:".12em",marginBottom:5,textTransform:"uppercase"}}>
              {day.day} · {PHASES[phase].dates}</div>
            <div style={{fontSize:21,fontWeight:900,letterSpacing:"-.01em",lineHeight:1.1}}>{day.label}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:12,color:nut.c,fontWeight:700,marginBottom:4}}>🍽 {nut.kcal} kcal</div>
            <div style={{fontSize:11,color:"#6a6a6a",fontFamily:"var(--fontb)"}}>P: 140g min · {weight}kg</div>
            <div style={{display:"flex",gap:4,marginTop:6,justifyContent:"flex-end",flexWrap:"wrap"}}>
              {types.map(t => <Chip key={t} label={tl(t)} color={tc(t)}/>)}
            </div>
          </div>
        </div>
        {w && <div style={{marginTop:10,padding:"7px 12px",borderRadius:8,
          background:w.l==="red"?"rgba(232,39,75,.1)":"rgba(255,140,0,.1)",
          border:`1px solid ${w.l==="red"?"rgba(232,39,75,.4)":"rgba(255,140,0,.4)"}`,
          fontSize:12,color:w.l==="red"?"#e8274b":"#e8c84a",fontFamily:"var(--fontb)"}}>
          {w.l==="red"?"🔴":"⚠️"} {w.m}
        </div>}
      </div>

      {/* Position focus */}
      {day.type.includes("football") && <div style={{background:"var(--card)",
        border:"1.5px solid var(--border)",borderRadius:10,padding:"8px 14px",marginBottom:10,
        display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:14}}>📍</span>
        <span style={{fontSize:11,fontFamily:"var(--fontb)",color:"#6a6a6a",lineHeight:1.5}}>
          <strong style={{color:"var(--purple)"}}>{position} focus:</strong> {POSFOCUS[position]||POSFOCUS.CAM}
        </span>
      </div>}

      {/* ☀ AM */}
      {amOrder.length > 0 && <div style={{marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
          <div style={{flex:1,height:1,background:"var(--border)"}}/>
          <span style={{fontSize:10,fontWeight:800,letterSpacing:".14em",color:"#e8c84a",
            padding:"3px 12px",borderRadius:20,background:"rgba(232,200,74,.08)",
            border:"1px solid rgba(232,200,74,.2)",fontFamily:"var(--fontb)"}}>☀ AM SESSION</span>
          <div style={{flex:1,height:1,background:"var(--border)"}}/>
        </div>
        {renderList(amOrder, "am")}
      </div>}

      {/* 🌙 PM */}
      {pmOrder.length > 0 && <div style={{marginBottom:8}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
          <div style={{flex:1,height:1,background:"var(--border)"}}/>
          <span style={{fontSize:10,fontWeight:800,letterSpacing:".14em",color:"#7b9cff",
            padding:"3px 12px",borderRadius:20,background:"rgba(123,156,255,.08)",
            border:"1px solid rgba(123,156,255,.2)",fontFamily:"var(--fontb)"}}>🌙 PM SESSION</span>
          <div style={{flex:1,height:1,background:"var(--border)"}}/>
        </div>
        {renderList(pmOrder, "pm")}
      </div>}

      {/* ⚙ Manage Sessions */}
      <button onClick={() => setShowMgr(true)} style={{width:"100%",padding:"11px",borderRadius:12,
        marginTop:6,marginBottom:4,background:"transparent",
        border:"1.5px dashed rgba(200,164,255,.35)",color:"#c8a4ff",fontSize:12,fontWeight:700,
        letterSpacing:".04em",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        ⚙ Manage Sessions
      </button>

      {/* Override badge */}
      {((ovs.added||[]).length>0||(ovs.removed||[]).length>0) && <div style={{
        fontSize:10,color:"#5a5a5a",fontFamily:"var(--fontb)",textAlign:"center",marginBottom:8}}>
        {(ovs.added||[]).length>0 && <span style={{color:"#1ed760"}}>+{ovs.added.length} added </span>}
        {(ovs.removed||[]).length>0 && <span style={{color:"#e8274b"}}>−{ovs.removed.length} removed </span>}
        today only
      </div>}

      {hasMAS && <div style={{background:"var(--card)",border:"1.5px dashed var(--border)",
        borderRadius:10,padding:"10px 14px",marginTop:4}}>
        <div style={{fontSize:9,color:"#6a6a6a",fontWeight:800,letterSpacing:".15em",marginBottom:6}}>
          MAS WEEK {mw.w} REFERENCE</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
          {[["Session 1",mw.rect],["Session 2a",mw.s2a],["Session 2b",mw.s2b]].map(([l,v])=>(
            <div key={l} style={{fontSize:11,fontFamily:"var(--fontb)"}}>
              <span style={{color:"#9b72cf"}}>{l}: </span><span style={{color:"#b3b3b3"}}>{v}</span>
            </div>
          ))}
        </div>
      </div>}
    </div>
  );
}

// How much to suggest bumping a target once hit (per exercise, sensible increments)
const SUGGEST_BUMP = {
  trapbar:2.5*3, bsquat:2.5*2, bss:2.5, rdl:2.5*2, stepup:2.5, hamcurl:2.5,
  bench:2.5*2, row:2.5*2, ohp:2.5, incline:2.5, lat:2.5, extrot:1,
  pallof:1, russian:1, medball:1, clean:2.5*2,
  boxjump:5, broad:0.1, plank:15, slam:1,
};

function TargetsPage({phase,weight,position,tgtLogs,setTgtLogs}) {
  const logs = tgtLogs || {};
  const setLogs = setTgtLogs || (()=>{});
  const pc = PHASES[phase].color;
  const effort = PHASE_EFFORT[phase];

  const cats = [
    {k:"lower",label:"Lower Body",icon:"🦵",ids:["trapbar","bsquat","bss","rdl","stepup","hamcurl","nordic","calf"]},
    {k:"upper",label:"Upper Body",icon:"💪",ids:["bench","pullup","row","ohp","incline","lat","extrot","chinup"]},
    {k:"core", label:"Core",      icon:"⬡", ids:["deadbug","plank","pallof","russian","copenh","hanging","medball","sidepl"]},
    {k:"power",label:"Power",     icon:"💥",ids:["boxjump","broad","clean","slam"]},
  ];
  const [openCat, setOpenCat] = useState("lower");

  return (
    <div className="fade">
      {/* Phase effort banner */}
      <div style={{background:`${effort.color}10`,border:`1.5px solid ${effort.color}30`,
        borderRadius:12,padding:"14px 16px",marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
          <span style={{fontFamily:"var(--font)",fontSize:13,fontWeight:800,color:effort.color}}>{effort.label}</span>
          <span style={{fontSize:11,fontWeight:800,color:effort.color,background:`${effort.color}18`,
            border:`1px solid ${effort.color}35`,borderRadius:20,padding:"2px 9px"}}>{effort.pct} effort</span>
        </div>
        <div style={{fontSize:11,color:"#6a6a6a",fontFamily:"var(--fontb)",lineHeight:1.7}}>{effort.msg}</div>
      </div>

      {/* Profile summary */}
      <div style={{background:"var(--card)",border:"1.5px solid var(--border)",borderRadius:10,
        padding:"12px 14px",marginBottom:14}}>
        <div style={{fontSize:11,color:"#6a6a6a",fontFamily:"var(--font)",fontWeight:700,
          letterSpacing:".08em",marginBottom:6}}>TARGETS SCALED TO YOUR PROFILE</div>
        <div style={{display:"flex",gap:16,flexWrap:"wrap",marginBottom:6}}>
          {[["Weight",`${weight}kg`],["Position",position],["Phase",PHASES[phase].label]].map(([l,v])=>(
            <div key={l} style={{fontSize:12,fontFamily:"var(--fontb)"}}>
              <span style={{color:"#6a6a6a"}}>{l}: </span>
              <span style={{color:"#f5f5f5",fontWeight:700}}>{v}</span>
            </div>
          ))}
        </div>
        <div style={{fontSize:11,color:"#5a5a5a",fontFamily:"var(--fontb)",lineHeight:1.6}}>
          Targets scale by bodyweight × position demands. When you hit a target, the app suggests your next milestone. You can also set a custom target override on any exercise.
        </div>
      </div>

      {cats.map(cat => {
        const isOpen = openCat === cat.k;
        return (
          <div key={cat.k} className="sec">
            <button className="sec-hdr" onClick={()=>setOpenCat(isOpen?"":cat.k)}>
              <span style={{fontSize:15}}>{cat.icon}</span>
              <span style={{flex:1,fontFamily:"var(--font)",fontSize:13,fontWeight:700,color:pc}}>{cat.label} Targets</span>
              <span style={{color:"var(--grey2)",fontSize:18,display:"inline-block",transition:"transform .25s",transform:isOpen?"rotate(0)":"rotate(-90deg)"}}>⌄</span>
            </button>
            <div className={`cl ${isOpen?"open":"shut"}`}>
              <div style={{padding:"0 15px 14px"}}>
                {cat.ids.map(id => {
                  const ex = EX[id]; if (!ex) return null;
                  const calcT = getT(ex, phase, weight, position);
                  const lk  = `tgt_${id}`;   // current best
                  const ovk = `tov_${id}`;   // custom target override
                  const val  = logs[lk] || "";
                  const customTarget = logs[ovk] || "";
                  // Display target: custom override takes priority over calculated
                  const displayT = customTarget || calcT;
                  const hit = displayT && displayT!=="-" && displayT!=="BW" && parseFloat(val) >= parseFloat(displayT);
                  // Suggested next target once hit
                  const bump = SUGGEST_BUMP[id] || 2.5;
                  const suggestedNext = hit && parseFloat(displayT) > 0
                    ? (parseFloat(displayT) + bump).toString()
                    : null;

                  return (
                    <div key={id} style={{padding:"11px 13px",borderRadius:10,marginBottom:6,
                      background:hit?"#0d1f10":"var(--card2)",
                      border:`1.5px solid ${hit?"rgba(30,215,96,.35)":"var(--border)"}`,
                      transition:"all .3s"}}>
                      {/* Exercise name + achieved badge */}
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                        flexWrap:"wrap",gap:8,marginBottom:hit?8:4}}>
                        <span style={{fontFamily:"var(--fontb)",fontSize:13,fontWeight:600,
                          color:hit?"#1ed760":"#f5f5f5"}}>
                          {hit?"✓ ":""}{ex.name}
                        </span>
                        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                          {/* Calculated target chip */}
                          {calcT&&calcT!=="-"&&<Chip
                            label={`${customTarget?"calc ":""}${calcT}${ex.unit!=="bw"&&ex.unit!=="s"?ex.unit:""}`}
                            color={customTarget?"#5a5a5a":hit?"#1ed760":"#9b72cf"}/>}
                          {/* Current best input */}
                          <input className="inp" value={val}
                            onChange={e=>setLogs({...logs,[lk]:e.target.value})}
                            placeholder="Your best"
                            style={{width:88,borderColor:hit?"rgba(30,215,96,.4)":"",
                              color:hit?"#1ed760":""}}/>
                        </div>
                      </div>

                      {/* Custom target override row */}
                      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:4}}>
                        <span style={{fontSize:10,color:"#5a5a5a",fontFamily:"var(--fontb)",whiteSpace:"nowrap"}}>
                          Custom target:
                        </span>
                        <input className="inp" value={customTarget}
                          onChange={e=>setLogs({...logs,[ovk]:e.target.value})}
                          placeholder={`${displayT}${ex.unit!=="bw"&&ex.unit!=="s"?ex.unit:""}`}
                          style={{width:88,fontSize:11,
                            borderColor:customTarget?"rgba(232,200,74,.5)":"rgba(255,255,255,.07)",
                            color:customTarget?"#e8c84a":""}}/>
                        {customTarget&&<button onClick={()=>setLogs({...logs,[ovk]:""})}
                          style={{background:"none",border:"none",color:"#5a5a5a",fontSize:11,
                            fontFamily:"var(--fontb)",padding:"2px 4px"}}>reset</button>}
                      </div>

                      {ex.note&&<div style={{fontSize:11,color:"#6a6a6a",fontFamily:"var(--fontb)",
                        marginBottom:6,fontStyle:"italic"}}>{ex.note}</div>}

                      {/* Progress bar */}
                      {displayT&&displayT!=="-"&&displayT!=="BW"&&
                        <Prog val={val} target={displayT}/>}

                      {/* Hit → suggest next level */}
                      {hit&&suggestedNext&&(
                        <div style={{marginTop:8,padding:"8px 12px",borderRadius:8,
                          background:"rgba(30,215,96,.06)",border:"1px solid rgba(30,215,96,.2)",
                          display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>
                          <div>
                            <div style={{fontSize:11,fontWeight:700,color:"#1ed760",marginBottom:1}}>
                              🎯 Target hit! Suggested next milestone:
                            </div>
                            <div style={{fontSize:12,color:"#f5f5f5",fontWeight:800}}>
                              {suggestedNext}{ex.unit!=="bw"&&ex.unit!=="s"?ex.unit:""}
                            </div>
                          </div>
                          <button onClick={()=>setLogs({...logs,[ovk]:suggestedNext})}
                            style={{background:"rgba(30,215,96,.15)",border:"1.5px solid rgba(30,215,96,.4)",
                              color:"#1ed760",borderRadius:20,padding:"6px 14px",fontSize:11,
                              fontWeight:800,whiteSpace:"nowrap"}}>
                            Set as Target →
                          </button>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}
