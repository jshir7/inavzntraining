/* ── NUTRITION PAGE ──────────────────────────────────────── */
function NutPage({defaultDate}) {
  const today = new Date();
  const todayKey = today.toISOString().slice(0,10);
  const [selDate, setSelDate] = useState(defaultDate || todayKey);
  const [nutLogs, setNutLogs] = useLS("nut_logs", {});
  const [weightLog, setWeightLog] = useLS("nut_weight", {});
  const [view, setView] = useState("log"); // "log" | "progress" | "plan"

  // Per-day data
  const dayData = nutLogs[selDate] || {items:[], kcal:0, p:0, c:0, f:0};
  const dayWeight = weightLog[selDate] || "";

  function setDayData(d) {
    setNutLogs({...nutLogs, [selDate]: d});
  }
  function setDayWeight(w) {
    setWeightLog({...weightLog, [selDate]: w});
  }

  // Persisted nutrition targets
  const [nutTargets, setNutTargets] = useLS("nut_targets", {kcal:2300, p:140, c:280, f:75});
  const KcalTarget = nutTargets.kcal || 2300;
  const ProtTarget = nutTargets.p    || 140;
  const CarbTarget = nutTargets.c    || 280;
  const FatTarget  = nutTargets.f    || 75;
  const [showTargets, setShowTargets] = useState(false);

  // Recalc totals from items
  function totals(items) {
    return items.reduce((a,x)=>({
      kcal: a.kcal + (parseFloat(x.kcal)||0),
      p:    a.p    + (parseFloat(x.p)||0),
      c:    a.c    + (parseFloat(x.c)||0),
      f:    a.f    + (parseFloat(x.f)||0),
    }), {kcal:0,p:0,c:0,f:0});
  }

  // Build last-14-days for progress
  const last14 = useMemo(()=>{
    const days=[];
    for(let i=13;i>=0;i--){
      const d=new Date(today); d.setDate(d.getDate()-i);
      const k=d.toISOString().slice(0,10);
      const entry=nutLogs[k]||{items:[]};
      const t=totals(entry.items||[]);
      days.push({k, label:d.toLocaleDateString("en-GB",{weekday:"short",day:"numeric"}), ...t, weight:parseFloat(weightLog[k])||null});
    }
    return days;
  },[nutLogs,weightLog]);

  // Date nav strip — last 7 days + today
  const strip = useMemo(()=>{
    const days=[];
    for(let i=6;i>=0;i--){
      const d=new Date(today); d.setDate(d.getDate()-i);
      const k=d.toISOString().slice(0,10);
      days.push({k, dow:d.toLocaleDateString("en-GB",{weekday:"short"}), dom:d.getDate()});
    }
    return days;
  },[]);

  return (
    <div className="fade">
      {/* Sub-nav */}
      <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:12}}>
        <div style={{display:"flex",gap:2,background:"var(--card)",borderRadius:10,padding:3,flex:1}}>
          {[["log","📋 Log"],["progress","📈 Progress"],["photos","📸 Photos"],["plan","🍽 Plan"]].map(([id,lbl])=>(
            <button key={id} onClick={()=>setView(id)} style={{
              flex:1,padding:"7px 4px",border:"none",borderRadius:8,fontSize:11,fontWeight:700,
              background:view===id?"var(--card2)":"transparent",
              color:view===id?"#c8a4ff":"#6a6a6a",transition:"all .18s"
            }}>{lbl}</button>
          ))}
        </div>
        <button onClick={()=>setShowTargets(true)} style={{
          flexShrink:0,padding:"8px 11px",borderRadius:10,border:"1.5px solid var(--border2)",
          background:"var(--card)",color:"#6a6a6a",fontSize:13
        }} title="Edit targets">🎯</button>
      </div>

      {showTargets && <NutTargetsModal targets={nutTargets} onSave={t=>{setNutTargets(t);setShowTargets(false);}} onClose={()=>setShowTargets(false)}/>}

      {view==="log" && <NutLogView
        strip={strip} selDate={selDate} setSelDate={setSelDate} todayKey={todayKey}
        dayData={dayData} setDayData={setDayData}
        dayWeight={dayWeight} setDayWeight={setDayWeight}
        totals={totals} KcalTarget={KcalTarget} ProtTarget={ProtTarget}
        CarbTarget={CarbTarget} FatTarget={FatTarget}
      />}
      {view==="progress" && <NutProgressView last14={last14} ProtTarget={ProtTarget} KcalTarget={KcalTarget}/>}
      {view==="photos" && <BodyPhotoView/>}
      {view==="plan" && <NutPlanView/>}
    </div>
  );
}

/* ── NUT LOG VIEW ────────────────────────────────────────── */
function NutLogView({strip,selDate,setSelDate,todayKey,dayData,setDayData,dayWeight,setDayWeight,totals,KcalTarget,ProtTarget,CarbTarget,FatTarget}) {
  const [showAdd, setShowAdd]   = useState(false);
  const [scanMode, setScanMode] = useState(false);
  const [weightDraft, setWeightDraft] = useState(dayWeight);

  useEffect(()=>setWeightDraft(dayWeight),[dayWeight,selDate]);

  const items = dayData.items || [];
  const tot   = totals(items);

  function removeItem(i) {
    const next = items.filter((_,idx)=>idx!==i);
    setDayData({...dayData, items:next});
  }
  function addItem(item) {
    const next = [...items, item];
    setDayData({...dayData, items:next});
    setShowAdd(false);
    setScanMode(false);
  }
  function saveWeight() {
    const w=parseFloat(weightDraft);
    if(!isNaN(w)&&w>0) setDayWeight(String(w));
  }

  const macroBar = (label,val,target,color) => {
    const pct=Math.min(100,Math.round((val/target)*100));
    return (
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:9,color:"#6a6a6a",fontWeight:800,letterSpacing:".08em",marginBottom:3}}>{label}</div>
        <div style={{height:5,background:"var(--border)",borderRadius:3,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${pct}%`,background:color,borderRadius:3,transition:"width .3s"}}/>
        </div>
        <div style={{fontSize:11,fontWeight:700,color:pct>=100?color:"#f5f5f5",marginTop:3}}>{Math.round(val)}<span style={{fontSize:9,color:"#6a6a6a",fontWeight:400}}>g</span></div>
      </div>
    );
  };

  return (
    <div>
      {/* Date strip */}
      <div style={{display:"flex",gap:4,overflowX:"auto",paddingBottom:4,marginBottom:12}}>
        {strip.map(d=>{
          const isSel=d.k===selDate;
          const isToday=d.k===todayKey;
          return (
            <button key={d.k} onClick={()=>setSelDate(d.k)} style={{
              flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",
              padding:"7px 10px",borderRadius:10,border:`1.5px solid ${isSel?"#c8a4ff":"var(--border)"}`,
              background:isSel?"rgba(200,164,255,.12)":"var(--card)",
              color:isSel?"#c8a4ff":isToday?"#f5f5f5":"#6a6a6a",transition:"all .15s"
            }}>
              <span style={{fontSize:9,fontWeight:800,letterSpacing:".06em"}}>{d.dow.toUpperCase()}</span>
              <span style={{fontSize:16,fontWeight:900,lineHeight:1.2}}>{d.dom}</span>
              {isToday&&<span style={{fontSize:7,color:"#c8a4ff",fontWeight:800}}>TODAY</span>}
            </button>
          );
        })}
      </div>

      {/* Calorie ring + macros summary */}
      <div className="sec" style={{marginBottom:10}}>
        <div style={{padding:"14px 15px"}}>
          <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:12}}>
            {/* Kcal circle */}
            <div style={{position:"relative",width:72,height:72,flexShrink:0}}>
              <svg width="72" height="72" viewBox="0 0 72 72">
                <circle cx="36" cy="36" r="30" fill="none" stroke="var(--border)" strokeWidth="6"/>
                <circle cx="36" cy="36" r="30" fill="none" stroke="#c8a4ff" strokeWidth="6"
                  strokeDasharray={`${Math.min(100,Math.round(tot.kcal/KcalTarget*100))*1.885} 188.5`}
                  strokeLinecap="round" transform="rotate(-90 36 36)" style={{transition:"stroke-dasharray .4s"}}/>
              </svg>
              <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                <span style={{fontSize:14,fontWeight:900,color:"#f5f5f5",lineHeight:1}}>{Math.round(tot.kcal)}</span>
                <span style={{fontSize:8,color:"#6a6a6a",fontWeight:700}}>kcal</span>
              </div>
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:10,color:"#6a6a6a",fontFamily:"var(--fontb)",marginBottom:8}}>
                Target: {KcalTarget} kcal · {KcalTarget - Math.round(tot.kcal) > 0 ? `${KcalTarget-Math.round(tot.kcal)} remaining` : "✓ target hit"}
              </div>
              <div style={{display:"flex",gap:10}}>
                {macroBar("PROTEIN", tot.p, ProtTarget, "#1ed760")}
                {macroBar("CARBS",   tot.c, CarbTarget, "#e8c84a")}
                {macroBar("FAT",     tot.f, FatTarget,  "#ff6b35")}
              </div>
            </div>
          </div>

          {/* Weight row */}
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 0",borderTop:"1px solid var(--border)"}}>
            <span style={{fontSize:13}}>⚖️</span>
            <span style={{fontSize:12,color:"#b3b3b3",fontFamily:"var(--fontb)",flex:1}}>Body weight</span>
            <input value={weightDraft} onChange={e=>setWeightDraft(e.target.value)}
              onBlur={saveWeight} onKeyDown={e=>e.key==="Enter"&&saveWeight()}
              placeholder="kg" className="inp" style={{width:64,textAlign:"center",fontSize:13,fontWeight:700}}/>
            <span style={{fontSize:11,color:"#6a6a6a"}}>kg</span>
          </div>
        </div>
      </div>

      {/* Food items list */}
      <div className="sec" style={{marginBottom:10}}>
        <div style={{padding:"12px 15px 6px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <span style={{fontFamily:"var(--font)",fontSize:13,fontWeight:700,color:"#f5f5f5"}}>Food Log</span>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>{setScanMode(true);setShowAdd(true);}} style={{
                padding:"6px 11px",borderRadius:20,fontSize:11,fontWeight:700,border:"1.5px solid #1ed760",
                background:"rgba(30,215,96,.1)",color:"#1ed760"}}>📷 Scan</button>
              <button onClick={()=>{setScanMode(false);setShowAdd(true);}} style={{
                padding:"6px 11px",borderRadius:20,fontSize:11,fontWeight:700,border:"1.5px solid #c8a4ff",
                background:"rgba(200,164,255,.1)",color:"#c8a4ff"}}>+ Add</button>
            </div>
          </div>
          {items.length===0&&<div style={{fontSize:12,color:"#4a4a4a",fontFamily:"var(--fontb)",
            textAlign:"center",padding:"16px 0"}}>No food logged yet</div>}
          {items.map((item,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",
              borderBottom:"1px solid var(--border)"}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:700,color:"#f5f5f5",
                  whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{item.name}</div>
                {item.qty&&<div style={{fontSize:10,color:"#6a6a6a",fontFamily:"var(--fontb)"}}>{item.qty}</div>}
              </div>
              <div style={{display:"flex",gap:8,fontSize:11,fontFamily:"var(--fontb)",flexShrink:0}}>
                <span style={{color:"#c8a4ff",fontWeight:700}}>{Math.round(item.kcal||0)}</span>
                <span style={{color:"#1ed760"}}>{Math.round(item.p||0)}p</span>
                <span style={{color:"#e8c84a"}}>{Math.round(item.c||0)}c</span>
                <span style={{color:"#ff6b35"}}>{Math.round(item.f||0)}f</span>
              </div>
              <button onClick={()=>removeItem(i)} style={{background:"none",border:"none",
                color:"#4a4a4a",fontSize:16,padding:"0 2px",cursor:"pointer",flexShrink:0}}>×</button>
            </div>
          ))}
        </div>
      </div>

      {showAdd && (
        <NutAddModal
          scanMode={scanMode}
          onAdd={addItem}
          onClose={()=>{setShowAdd(false);setScanMode(false);}}
        />
      )}
    </div>
  );
}

/* ── NUT ADD MODAL (barcode + manual) ────────────────────── */
function NutAddModal({scanMode, onAdd, onClose}) {
  const [mode, setMode]     = useState(scanMode ? "scan" : "manual");
  const [query, setQuery]   = useState("");
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [err, setErr]       = useState("");
  const [scanErr, setScanErr] = useState("");
  const [scanStatus, setScanStatus] = useState("Initialising camera…");
  const videoRef   = useRef(null);
  const streamRef  = useRef(null);
  const rafRef     = useRef(null);
  const readerRef  = useRef(null);
  const canvasRef  = useRef(null);

  // Manual form
  const [form, setForm] = useState({name:"",qty:"",kcal:"",p:"",c:"",f:""});

  // Load ZXing lazily when scan mode is entered
  useEffect(()=>{
    if(mode!=="scan") { stopScan(); return; }
    startScan();
    return ()=>stopScan();
  },[mode]); // eslint-disable-line react-hooks/exhaustive-deps

  async function loadZXing() {
    if(window.ZXingBrowser) return window.ZXingBrowser;
    return new Promise((resolve, reject)=>{
      const s=document.createElement("script");
      s.src="https://unpkg.com/@zxing/browser@0.1.4/umd/index.min.js";
      s.onload=()=>{
        // unpkg exposes it as ZXingBrowser
        if(window.ZXingBrowser) resolve(window.ZXingBrowser);
        else reject(new Error("ZXing bundle loaded but ZXingBrowser not found"));
      };
      s.onerror=()=>reject(new Error("Failed to load ZXing"));
      document.head.appendChild(s);
    });
  }

  async function startScan() {
    setScanErr(""); setScanStatus("Initialising camera…");
    try {
      const ZXing = await loadZXing();
      setScanStatus("Starting camera…");
      const reader = new ZXing.BrowserMultiFormatReader();
      readerRef.current = reader;
      // decodeFromVideoDevice handles stream + decoding — pass null for default/back camera
      const devices = await ZXing.BrowserCodeReader.listVideoInputDevices();
      // Prefer back camera on mobile
      const deviceId = devices.find(d=>/(back|rear|environment)/i.test(d.label))?.deviceId || undefined;
      setScanStatus("Point at barcode");
      await reader.decodeFromVideoDevice(deviceId, videoRef.current, (result, err) => {
        if(result) {
          reader.reset();
          lookupBarcode(result.getText());
        }
        // err fires every frame when no barcode found — that's normal, ignore
      });
    } catch(e) {
      if(e.name==="NotAllowedError"||e.message?.includes("Permission")||e.message?.includes("allowed")) {
        setScanErr("Camera permission denied. On iOS: Settings → Safari → Camera → Allow, then re-open the app.");
      } else if(e.message?.includes("ZXing")||e.message?.includes("load")) {
        setScanErr("Scanner failed to load. Check your internet connection and try again.");
      } else {
        setScanErr(`Camera unavailable: ${e.message||e.name||"unknown error"}`);
      }
    }
  }

  function stopScan() {
    if(rafRef.current) cancelAnimationFrame(rafRef.current);
    try { readerRef.current?.reset(); } catch {}
    if(streamRef.current) streamRef.current.getTracks().forEach(t=>t.stop());
    streamRef.current=null; readerRef.current=null;
  }

  // scanFrame no longer needed — ZXing handles it internally
  function scanFrame() {}

  async function lookupBarcode(barcode) {
    setLoading(true); setErr(""); setResults([]);
    try {
      const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
      const data = await res.json();
      if(data.status===1 && data.product) {
        const p = data.product;
        const n100 = p.nutriments;
        const name = p.product_name || "Unknown product";
        const servingSize = p.serving_size || "100g";
        // Per 100g values
        const item = {
          name, qty: servingSize,
          kcal: n100["energy-kcal_100g"] || n100["energy-kcal_serving"] || 0,
          p:    n100["proteins_100g"]     || 0,
          c:    n100["carbohydrates_100g"]|| 0,
          f:    n100["fat_100g"]          || 0,
          _per100: true,
          _raw: {kcal: n100["energy-kcal_100g"]||0, p:n100["proteins_100g"]||0, c:n100["carbohydrates_100g"]||0, f:n100["fat_100g"]||0}
        };
        setResults([item]);
        setMode("result");
      } else { setErr("Product not found. Try entering manually."); setMode("manual"); }
    } catch { setErr("Network error. Check connection and try again."); setMode("manual"); }
    setLoading(false);
  }

  async function searchFood(q) {
    if(!q.trim()) return;
    setLoading(true); setErr(""); setResults([]);
    try {
      const res = await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q)}&search_simple=1&action=process&json=1&page_size=6`);
      const data = await res.json();
      if(data.products && data.products.length>0) {
        const items = data.products.filter(p=>p.product_name&&p.nutriments).map(p=>({
          name: p.product_name,
          qty: p.serving_size||"100g",
          kcal: p.nutriments["energy-kcal_100g"]||0,
          p:    p.nutriments["proteins_100g"]||0,
          c:    p.nutriments["carbohydrates_100g"]||0,
          f:    p.nutriments["fat_100g"]||0,
          _per100: true,
          _raw: {kcal:p.nutriments["energy-kcal_100g"]||0,p:p.nutriments["proteins_100g"]||0,c:p.nutriments["carbohydrates_100g"]||0,f:p.nutriments["fat_100g"]||0}
        }));
        setResults(items); setMode("results");
      } else { setErr("No results found. Add manually below."); }
    } catch { setErr("Search failed. Add manually."); }
    setLoading(false);
  }

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:900,display:"flex",
      alignItems:"flex-end",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"var(--card)",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:600,
        maxHeight:"90vh",overflowY:"auto",padding:"20px 18px 40px"}}>

        {/* Handle */}
        <div style={{width:36,height:4,borderRadius:2,background:"var(--border)",margin:"0 auto 16px"}}/>

        {/* Mode tabs */}
        <div style={{display:"flex",gap:2,background:"var(--black)",borderRadius:8,padding:3,marginBottom:16}}>
          {[["scan","📷 Barcode"],["search","🔍 Search"],["manual","✏️ Manual"]].map(([id,lbl])=>(
            <button key={id} onClick={()=>setMode(id)} style={{
              flex:1,padding:"6px 4px",border:"none",borderRadius:6,fontSize:11,fontWeight:700,
              background:mode===id?"var(--card2)":"transparent",
              color:mode===id?"#c8a4ff":"#6a6a6a",transition:"all .15s"
            }}>{lbl}</button>
          ))}
        </div>

        {mode==="scan"&&(
          <div style={{textAlign:"center"}}>
            {scanErr ? (
              <div style={{color:"#e8274b",fontSize:12,fontFamily:"var(--fontb)",padding:"16px 8px",lineHeight:1.6}}>{scanErr}</div>
            ) : (
              <>
                <div style={{position:"relative",borderRadius:12,overflow:"hidden",marginBottom:12,
                  background:"#000",aspectRatio:"4/3"}}>
                  <video ref={videoRef} playsInline muted style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                  {/* Hidden canvas for ZXing frame decoding */}
                  <canvas ref={canvasRef} style={{display:"none"}}/>
                  {/* Viewfinder overlay */}
                  <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
                    <div style={{width:200,height:120,border:"2px solid #1ed760",borderRadius:8,
                      boxShadow:"0 0 0 9999px rgba(0,0,0,.45)"}}/>
                  </div>
                </div>
                <div style={{fontSize:11,color:"#6a6a6a",fontFamily:"var(--fontb)"}}>{scanStatus}</div>
              </>
            )}
            {loading&&<div style={{color:"#c8a4ff",fontSize:12,marginTop:8,fontFamily:"var(--fontb)"}}>Looking up product…</div>}
          </div>
        )}

        {/* SEARCH MODE */}
        {mode==="search"&&(
          <div>
            <div style={{display:"flex",gap:8,marginBottom:12}}>
              <input className="inp" value={query} onChange={e=>setQuery(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&searchFood(query)}
                placeholder="Search food (e.g. chicken breast, oats…)" style={{flex:1}}/>
              <button onClick={()=>searchFood(query)} disabled={loading} style={{
                padding:"0 14px",borderRadius:10,border:"none",background:"#c8a4ff",
                color:"#000",fontWeight:800,fontSize:12}}>
                {loading?"…":"Go"}
              </button>
            </div>
            {err&&<div style={{color:"#e8274b",fontSize:11,fontFamily:"var(--fontb)",marginBottom:8}}>{err}</div>}
          </div>
        )}

        {/* SEARCH RESULTS */}
        {(mode==="results"||mode==="result")&&results.length>0&&(
          <SearchResultList results={results} onAdd={onAdd} onBack={()=>setMode("search")}/>
        )}

        {/* MANUAL FORM */}
        {(mode==="manual"||(!["scan","search","results","result"].includes(mode)))&&(
          <ManualFoodForm form={form} setForm={setForm} onAdd={onAdd} err={err}/>
        )}
      </div>
    </div>
  );
}

function SearchResultList({results, onAdd, onBack}) {
  const [sel, setSel] = useState(null);
  const [qty, setQty] = useState("100");

  function scale(item, g) {
    const r=parseFloat(g)||100;
    const f=r/100;
    return {
      name: item.name, qty: `${r}g`,
      kcal: Math.round((item._raw?.kcal||item.kcal)*f),
      p:    Math.round((item._raw?.p||item.p)*f*10)/10,
      c:    Math.round((item._raw?.c||item.c)*f*10)/10,
      f:    Math.round((item._raw?.f||item.f)*f*10)/10,
    };
  }

  if(sel!==null) {
    const item=results[sel];
    const scaled=scale(item,qty);
    return (
      <div>
        <button onClick={()=>setSel(null)} style={{background:"none",border:"none",color:"#6a6a6a",
          fontSize:12,fontFamily:"var(--fontb)",marginBottom:12}}>← Back to results</button>
        <div style={{fontWeight:700,fontSize:14,color:"#f5f5f5",marginBottom:4}}>{item.name}</div>
        <div style={{fontSize:11,color:"#6a6a6a",fontFamily:"var(--fontb)",marginBottom:12}}>Values per 100g — adjust quantity below</div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
          <label style={{fontSize:12,color:"#b3b3b3",fontFamily:"var(--fontb)"}}>Quantity (g):</label>
          <input className="inp" value={qty} onChange={e=>setQty(e.target.value)}
            type="number" min="1" style={{width:80,textAlign:"center"}}/>
        </div>
        <div style={{display:"flex",gap:10,marginBottom:16}}>
          {[["Kcal",scaled.kcal,"#c8a4ff"],["Protein",`${scaled.p}g`,"#1ed760"],["Carbs",`${scaled.c}g`,"#e8c84a"],["Fat",`${scaled.f}g`,"#ff6b35"]].map(([l,v,c])=>(
            <div key={l} style={{flex:1,textAlign:"center",background:"var(--card2)",borderRadius:8,padding:"8px 4px"}}>
              <div style={{fontSize:16,fontWeight:900,color:c}}>{v}</div>
              <div style={{fontSize:9,color:"#6a6a6a",fontWeight:800}}>{l.toUpperCase()}</div>
            </div>
          ))}
        </div>
        <button onClick={()=>onAdd(scaled)} style={{width:"100%",padding:13,borderRadius:12,
          border:"none",background:"#c8a4ff",color:"#000",fontWeight:900,fontSize:13}}>
          Add to Log →
        </button>
      </div>
    );
  }

  return (
    <div>
      <button onClick={onBack} style={{background:"none",border:"none",color:"#6a6a6a",
        fontSize:12,fontFamily:"var(--fontb)",marginBottom:10}}>← Back to search</button>
      {results.map((r,i)=>(
        <button key={i} onClick={()=>setSel(i)} style={{
          width:"100%",textAlign:"left",padding:"10px 12px",marginBottom:6,borderRadius:10,
          border:"1.5px solid var(--border2)",background:"var(--card2)",cursor:"pointer"}}>
          <div style={{fontSize:12,fontWeight:700,color:"#f5f5f5"}}>{r.name}</div>
          <div style={{fontSize:10,color:"#6a6a6a",fontFamily:"var(--fontb)",marginTop:2}}>
            {Math.round(r.kcal)} kcal · {Math.round(r.p)}g protein · per 100g
          </div>
        </button>
      ))}
    </div>
  );
}

function ManualFoodForm({form, setForm, onAdd, err}) {
  function f(k,v) { setForm(p=>({...p,[k]:v})); }
  function submit() {
    if(!form.name.trim()) return;
    onAdd({
      name:form.name.trim(), qty:form.qty||"",
      kcal:parseFloat(form.kcal)||0, p:parseFloat(form.p)||0,
      c:parseFloat(form.c)||0, f:parseFloat(form.f)||0
    });
  }
  return (
    <div>
      {err&&<div style={{color:"#e8274b",fontSize:11,fontFamily:"var(--fontb)",marginBottom:8}}>{err}</div>}
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <input className="inp" value={form.name} onChange={e=>f("name",e.target.value)}
          placeholder="Food name *" style={{width:"100%"}}/>
        <input className="inp" value={form.qty} onChange={e=>f("qty",e.target.value)}
          placeholder="Quantity (e.g. 150g, 1 serving)" style={{width:"100%"}}/>
        <div style={{display:"flex",gap:8}}>
          <input className="inp" value={form.kcal} onChange={e=>f("kcal",e.target.value)}
            placeholder="Kcal" type="number" min="0" style={{flex:1}}/>
          <input className="inp" value={form.p} onChange={e=>f("p",e.target.value)}
            placeholder="Protein g" type="number" min="0" style={{flex:1}}/>
        </div>
        <div style={{display:"flex",gap:8}}>
          <input className="inp" value={form.c} onChange={e=>f("c",e.target.value)}
            placeholder="Carbs g" type="number" min="0" style={{flex:1}}/>
          <input className="inp" value={form.f} onChange={e=>f("f",e.target.value)}
            placeholder="Fat g" type="number" min="0" style={{flex:1}}/>
        </div>
        <button onClick={submit} disabled={!form.name.trim()} style={{
          width:"100%",padding:13,borderRadius:12,border:"none",
          background:form.name.trim()?"#c8a4ff":"#1e1e1e",
          color:form.name.trim()?"#000":"#4a4a4a",fontWeight:900,fontSize:13}}>
          Add to Log →
        </button>
      </div>
    </div>
  );
}

/* ── NUT PROGRESS VIEW ───────────────────────────────────── */
function NutProgressView({last14, ProtTarget, KcalTarget}) {
  const [metric, setMetric] = useState("kcal");

  const maxVal = useMemo(()=>{
    const vals = last14.map(d=>metric==="weight"?d.weight:d[metric]).filter(Boolean);
    return Math.max(...vals, metric==="weight"?100:metric==="kcal"?KcalTarget:ProtTarget) * 1.1;
  },[last14,metric,KcalTarget,ProtTarget]);

  const target = metric==="kcal"?KcalTarget:metric==="p"?ProtTarget:null;
  const color  = metric==="kcal"?"#c8a4ff":metric==="p"?"#1ed760":metric==="c"?"#e8c84a":metric==="f"?"#ff6b35":"#2d86ff";
  const label  = {kcal:"Calories",p:"Protein (g)",c:"Carbs (g)",f:"Fat (g)",weight:"Weight (kg)"}[metric];

  return (
    <div>
      {/* Metric selector */}
      <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:14}}>
        {[["kcal","Kcal","#c8a4ff"],["p","Protein","#1ed760"],["c","Carbs","#e8c84a"],["f","Fat","#ff6b35"],["weight","Weight","#2d86ff"]].map(([id,lbl,c])=>(
          <button key={id} onClick={()=>setMetric(id)} style={{
            padding:"5px 12px",borderRadius:20,fontSize:11,fontWeight:700,
            border:`1.5px solid ${metric===id?c:"var(--border2)"}`,
            background:metric===id?`${c}18`:"transparent",
            color:metric===id?c:"#6a6a6a",transition:"all .15s"
          }}>{lbl}</button>
        ))}
      </div>

      <div className="sec">
        <div style={{padding:"14px 15px"}}>
          <div style={{fontSize:12,fontWeight:700,color:"#f5f5f5",marginBottom:14}}>{label} — Last 14 Days</div>
          {/* Bar chart */}
          <div style={{display:"flex",alignItems:"flex-end",gap:3,height:100,marginBottom:6}}>
            {last14.map((d,i)=>{
              const val = metric==="weight"?d.weight:d[metric];
              const h   = val ? Math.round((val/maxVal)*100) : 0;
              const isTarget = target && val>=target;
              return (
                <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                  <div style={{
                    width:"100%",height:`${h}%`,minHeight:val?2:0,
                    background:isTarget?color:`${color}60`,borderRadius:"3px 3px 0 0",
                    transition:"height .3s",position:"relative"
                  }}/>
                  <div style={{fontSize:7,color:"#4a4a4a",fontWeight:700,textAlign:"center",
                    whiteSpace:"nowrap",overflow:"hidden",width:"100%",lineHeight:1.2}}>
                    {d.label.split(" ")[0]}
                  </div>
                </div>
              );
            })}
          </div>
          {/* Target line label */}
          {target&&<div style={{fontSize:10,color:color,fontFamily:"var(--fontb)",marginTop:4}}>
            ■ Target: {target}{metric==="kcal"?" kcal":"g"} (brighter bars = at/over target)
          </div>}

          {/* Stats row */}
          <div style={{display:"flex",gap:8,marginTop:14}}>
            {(()=>{
              const vals=last14.map(d=>metric==="weight"?d.weight:d[metric]).filter(v=>v&&v>0);
              if(!vals.length) return <div style={{fontSize:11,color:"#4a4a4a",fontFamily:"var(--fontb)"}}>No data yet</div>;
              const avg=Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
              const mx=Math.round(Math.max(...vals));
              const mn=Math.round(Math.min(...vals));
              return [["Avg",avg],["High",mx],["Low",mn]].map(([l,v])=>(
                <div key={l} style={{flex:1,background:"var(--card2)",borderRadius:8,padding:"8px 0",textAlign:"center"}}>
                  <div style={{fontSize:16,fontWeight:900,color}}>{v}</div>
                  <div style={{fontSize:9,color:"#6a6a6a",fontWeight:800}}>{l.toUpperCase()}</div>
                </div>
              ));
            })()}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── BODY PHOTO VIEW ─────────────────────────────────────── */
function BodyPhotoView() {
  const [photos, setPhotos] = useLS("body_photos", []);
  const [mode, setMode]     = useState("timeline"); // "timeline" | "compare"
  const [lightbox, setLightbox] = useState(null);
  const [compareA, setCompareA] = useState(null);
  const [compareB, setCompareB] = useState(null);
  const [label, setLabel]   = useState("Front");
  const [note, setNote]     = useState("");
  const fileRef = useRef(null);
  const today = new Date().toISOString().slice(0,10);

  function handleFile(e) {
    const file = e.target.files?.[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const entry = {
        id: Date.now(),
        date: today,
        label,
        note: note.trim(),
        src: ev.target.result,
      };
      setPhotos(prev => [entry, ...prev]);
      setNote("");
      if(fileRef.current) fileRef.current.value="";
    };
    reader.readAsDataURL(file);
  }

  function deletePhoto(id) {
    if(!window.confirm("Delete this photo?")) return;
    setPhotos(prev => prev.filter(p=>p.id!==id));
    setLightbox(null);
  }

  const grouped = useMemo(()=>{
    const map = {};
    photos.forEach(p=>{
      const m = p.date.slice(0,7);
      if(!map[m]) map[m]=[]; map[m].push(p);
    });
    return Object.entries(map).sort((a,b)=>b[0].localeCompare(a[0]));
  },[photos]);

  const fmtDate = d => new Date(d).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
  const fmtMonth = ym => {
    const [y,m]=ym.split("-");
    return new Date(y,m-1,1).toLocaleDateString("en-GB",{month:"long",year:"numeric"});
  };

  // In compare mode, clicking a photo selects it as A then B
  function selectForCompare(p) {
    if(!compareA || (compareA && compareB)) {
      setCompareA(p); setCompareB(null);
    } else if(compareA && !compareB && p.id!==compareA.id) {
      setCompareB(p);
    } else {
      setCompareA(p); setCompareB(null);
    }
  }

  return (
    <div>
      {/* Upload card */}
      <div className="sec" style={{marginBottom:12}}>
        <div style={{padding:"14px 15px"}}>
          <div style={{fontSize:13,fontWeight:700,color:"#f5f5f5",marginBottom:12,fontFamily:"var(--font)"}}>Add Progress Photo</div>

        )}

        {/* TIMELINE MODE */}
        {mode==="timeline" && grouped.map(([month, entries])=>(
          <div key={month} style={{marginBottom:16}}>

                  <img src={p.src} alt={p.label} style={{width:"100%",height:"100%",objectFit:"cover"}}/>

/* ── NUT TARGETS MODAL ───────────────────────────────────── */
function NutTargetsModal({targets, onSave, onClose}) {
  const [draft, setDraft] = useState({
    kcal: String(targets.kcal||2300),
    p:    String(targets.p||140),
    c:    String(targets.c||280),
    f:    String(targets.f||75),
  });
  function f(k,v) { setDraft(d=>({...d,[k]:v})); }
  function save() {
    onSave({
      kcal: parseFloat(draft.kcal)||2300,
      p:    parseFloat(draft.p)||140,
      c:    parseFloat(draft.c)||280,
      f:    parseFloat(draft.f)||75,
    });
  }

  const fields = [
    {key:"kcal", label:"Calories",    unit:"kcal", color:"#c8a4ff"},
    {key:"p",    label:"Protein",     unit:"g",    color:"#1ed760"},
    {key:"c",    label:"Carbohydrates",unit:"g",   color:"#e8c84a"},
    {key:"f",    label:"Fat",         unit:"g",    color:"#ff6b35"},
  ];

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:900,
      display:"flex",alignItems:"flex-end",justifyContent:"center"}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"var(--card)",borderRadius:"20px 20px 0 0",width:"100%",
        maxWidth:600,padding:"20px 18px 40px"}}>
        <div style={{width:36,height:4,borderRadius:2,background:"var(--border)",margin:"0 auto 16px"}}/>
        <div style={{fontSize:14,fontWeight:900,color:"#f5f5f5",marginBottom:4,fontFamily:"var(--font)"}}>🎯 Daily Targets</div>
        <div style={{fontSize:11,color:"#6a6a6a",fontFamily:"var(--fontb)",marginBottom:18}}>
          These apply to every day. Adjust whenever your goal changes.
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:20}}>
          {fields.map(({key,label,unit,color})=>(
            <div key={key} style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:color,flexShrink:0}}/>
              <span style={{flex:1,fontSize:13,fontWeight:700,color:"#f5f5f5",fontFamily:"var(--fontb)"}}>{label}</span>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <input className="inp" value={draft[key]} onChange={e=>f(key,e.target.value)}
                  type="number" min="0"
                  style={{width:80,textAlign:"center",fontSize:14,fontWeight:700,
                    borderColor:color,color}}/>
                <span style={{fontSize:11,color:"#6a6a6a",width:28}}>{unit}</span>
              </div>
            </div>
          ))}
        </div>
        {/* Macro sanity hint */}
        {(()=>{
          const kcalFromMacros = (parseFloat(draft.p)||0)*4 + (parseFloat(draft.c)||0)*4 + (parseFloat(draft.f)||0)*9;
          const diff = Math.abs(kcalFromMacros - (parseFloat(draft.kcal)||0));
          if(diff > 100) return (
            <div style={{fontSize:11,color:"#e8c84a",fontFamily:"var(--fontb)",marginBottom:14,
              padding:"8px 12px",background:"rgba(232,200,74,.08)",borderRadius:8,
              border:"1px solid rgba(232,200,74,.2)"}}>
              ⚠ Macros add up to ~{Math.round(kcalFromMacros)} kcal vs your {draft.kcal} kcal target
            </div>
          );
        })()}
        <button onClick={save} style={{width:"100%",padding:13,borderRadius:12,border:"none",
          background:"#c8a4ff",color:"#000",fontWeight:900,fontSize:13}}>
          Save Targets →
        </button>
      </div>
    </div>
  );
}

/* ── PROFILE MODAL ───────────────────────────────────────── */
function ProfileModal({profile, onSave, onClose, taperEvents=[], setTaperEvents}) {
  const [p, setP] = useState({...profile});
  const [tab, setTab] = useState("profile");
  const [importErr, setImportErr] = useState("");
  const [newEvent, setNewEvent] = useState({date:"", label:"", type:"trial"});

  function handleExport() {
    const data = {};
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      try { data[k] = JSON.parse(localStorage.getItem(k)); } catch { data[k] = localStorage.getItem(k); }
    }
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = `inavzn-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click(); URL.revokeObjectURL(url);
  }

  function handleImport(e) {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        Object.entries(data).forEach(([k,v]) => {
          try { localStorage.setItem(k, typeof v === "string" ? v : JSON.stringify(v)); } catch {}
        });
        setImportErr("");
        window.location.reload();
      } catch { setImportErr("Invalid backup file. Please choose a valid INAVZN backup."); }
    };
    reader.readAsText(file);
  }

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
          <Logo size={36}/>
          <div style={{fontFamily:"var(--font)",fontSize:16,fontWeight:900,flex:1}}>Player Profile</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#5a5a5a",fontSize:22,lineHeight:1}}>✕</button>
        </div>

        {/* Tab bar */}
        <div style={{display:"flex",gap:2,background:"var(--card)",borderRadius:8,padding:3,marginBottom:18}}>
          {[["profile","Profile"],["taper","⚡ Taper"],["data","Backup"]].map(([id,label])=>(
            <button key={id} onClick={()=>setTab(id)} style={{
              flex:1,padding:"7px 6px",border:"none",borderRadius:6,fontSize:11,fontWeight:700,
              background:tab===id?"var(--card2)":"transparent",
              color:tab===id?"#c8a4ff":"#6a6a6a",transition:"all .18s",fontFamily:"var(--font)"
            }}>{label}</button>
          ))}
        </div>

        {tab==="profile" && (
          <div style={{display:"flex",flexDirection:"column",gap:11}}>
            {[["Name","name","text"],["Age","age","number"],["Height (cm)","height","number"],["Weight (kg)","weight","number"]].map(([lbl,key,type])=>(
              <label key={key}>
                <div style={{fontSize:10,color:"#6a6a6a",fontWeight:800,letterSpacing:".12em",marginBottom:5,fontFamily:"var(--font)"}}>{lbl.toUpperCase()}</div>
                <input type={type} className="inp" value={p[key]||""} onChange={e=>setP({...p,[key]:e.target.value})} style={{width:"100%"}}/>
              </label>
            ))}
            <label>
              <div style={{fontSize:10,color:"#6a6a6a",fontWeight:800,letterSpacing:".12em",marginBottom:5,fontFamily:"var(--font)"}}>POSITION</div>
              <select className="inp" value={p.position||"CAM"} onChange={e=>setP({...p,position:e.target.value})} style={{width:"100%"}}>
                {POSITIONS.map(pos=><option key={pos}>{pos}</option>)}
              </select>
            </label>
            <label>
              <div style={{fontSize:10,color:"#6a6a6a",fontWeight:800,letterSpacing:".12em",marginBottom:5,fontFamily:"var(--font)"}}>PRIMARY GOAL</div>
              <select className="inp" value={p.goal||"Pro Contract"} onChange={e=>setP({...p,goal:e.target.value})} style={{width:"100%"}}>
                {GOALS.map(g=><option key={g}>{g}</option>)}

          </div>

            <div style={{background:"var(--card)",border:"1.5px solid var(--border)",borderRadius:12,padding:14,marginBottom:14}}>

                  <input type="date" className="inp" value={newEvent.date}

/* ── CALENDAR STRIP ──────────────────────────────────────── */
/* ── REAL CALENDAR HELPERS ───────────────────────────────── */
const MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAY_NAMES   = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

function getMondayOf(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}
function getWeekDates(monday) {
  return Array.from({length:7}, (_,i) => {
    const d = new Date(monday);
    d.setDate(d.getDate() + i);
    return d;
  });
}
function formatDate(d) {
  return `${d.getDate()} ${MONTH_NAMES[d.getMonth()]}`;
}
function isSameDay(a, b) {
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}
function getPhaseBoundaries(year) {
  return {
    offseason: { start: new Date(year, 4, 25), end: new Date(year, 6, 4)  },
    preseason: { start: new Date(year, 6, 5),  end: new Date(year, 7, 1)  },
    inseason:  { start: new Date(year, 7, 2),  end: new Date(year+1, 4, 24) },
  };
}
function getPhaseForDate(date) {
  const y = date.getFullYear();
  const b = getPhaseBoundaries(y);
  if (date >= b.offseason.start && date <= b.offseason.end) return "offseason";
  if (date >= b.preseason.start && date <= b.preseason.end) return "preseason";
  return "inseason";
}

/* ── CALENDAR STRIP (real dates) ─────────────────────────── */
function CalStrip({weekDates,activeDateIdx,setActiveDateIdx,weekPhases,weekMonday,setCurrentWeekStart,sched,setSched,dragD,setDragD,logs,isDayComplete,phaseColor}) {
  const today = new Date();
  const [pendingSwap, setPendingSwap] = useState(null); // {from, to}
  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <button onClick={()=>{
          const prev = new Date(weekMonday);
          prev.setDate(prev.getDate()-7);
          setCurrentWeekStart(prev.toISOString());
          setActiveDateIdx(0);
        }} style={{background:"var(--card2)",border:"1.5px solid var(--border)",color:"#b3b3b3",
          borderRadius:8,padding:"4px 14px",fontSize:16,fontWeight:700,lineHeight:1}}>‹</button>
        <div style={{fontSize:11,color:"#6a6a6a",fontFamily:"var(--fontb)",fontWeight:600,letterSpacing:".05em",textAlign:"center"}}>
          {formatDate(weekDates[0])} — {formatDate(weekDates[6])}
          <span style={{color:"#3a3a3a"}}> · {weekDates[0].getFullYear()}</span>
        </div>
        <button onClick={()=>{
          const next = new Date(weekMonday);
          next.setDate(next.getDate()+7);
          setCurrentWeekStart(next.toISOString());
          setActiveDateIdx(0);
        }} style={{background:"var(--card2)",border:"1.5px solid var(--border)",color:"#b3b3b3",
          borderRadius:8,padding:"4px 14px",fontSize:16,fontWeight:700,lineHeight:1}}>›</button>
      </div>
      <div style={{display:"flex",gap:4,overflowX:"auto",paddingBottom:2,"--phase-color":PHASES[weekPhases?.[activeDateIdx]]?.color||"#c8a4ff"}}>
        {weekDates.map((date,i)=>{
          const dayPhase   = weekPhases[i];
          const phColor    = PHASES[dayPhase]?.color || phaseColor;
          const isToday    = isSameDay(date, today);
          const isActive   = activeDateIdx === i;
          const dateKey    = date.toISOString().slice(0,10);
          const complete   = isDayComplete(dateKey, sched, i, weekPhases[i]);
          const day        = sched[i];
          const w          = day ? warn(sched,i) : null;
          const types      = day ? day.type.split("+") : ["rest"];

          return (
            <div key={i}
              className={`day-pill${isActive?" active":""}${dragD===i?" dsrc":""}`}
              onClick={()=>{ if(!dragD) setActiveDateIdx(i); }}
              onTouchStart={e=>{
                e.stopPropagation();
                setDragD(i);
              }}
              onTouchMove={e=>{
                e.preventDefault();
                const touch = e.touches[0];
                const el = document.elementFromPoint(touch.clientX, touch.clientY);
                const pill = el?.closest('.day-pill');
                document.querySelectorAll('.day-pill').forEach(p=>p.classList.remove('dov'));
                if(pill && pill !== e.currentTarget) pill.classList.add('dov');
              }}
              onTouchEnd={e=>{
                e.stopPropagation();
                const touch = e.changedTouches[0];
                const el = document.elementFromPoint(touch.clientX, touch.clientY);
                const pill = el?.closest('.day-pill');
                document.querySelectorAll('.day-pill').forEach(p=>p.classList.remove('dov'));
                if(pill){
                  const pills = Array.from(document.querySelectorAll('.day-pill'));
                  const targetIdx = pills.indexOf(pill);
                  if(targetIdx !== -1 && targetIdx !== dragD && dragD !== null){
                    setPendingSwap({from: dragD, to: targetIdx});
                  }
                }
                setDragD(null);
              }}
              style={{
                borderColor: complete ? "rgba(30,215,96,.6)"
                           : isActive ? phColor
                           : isToday  ? phColor+"55"
                           : undefined,
                background: complete && !isActive ? "rgba(30,215,96,.07)" : undefined,
              }}
            >
              <div style={{fontSize:9,color:isActive?phColor:"var(--grey3)",
                letterSpacing:"-2.5px",marginBottom:1,cursor:"grab",lineHeight:1}}>⠿⠿</div>
              <div style={{fontSize:9,fontWeight:700,
                color:isActive?phColor:complete?"#1ed760":"#5a5a5a",
                letterSpacing:".04em",marginBottom:1}}>{DAY_NAMES[i]}</div>
              <div style={{fontSize:12,fontWeight:900,
                color:isActive?phColor:complete?"#1ed760":isToday?"#ffffff":"#7a7a7a",
                marginBottom:3}}>
                {date.getDate()}
              </div>
              {/* Type dots or complete tick */}
              {complete ? (
                <div style={{fontSize:12,color:"#1ed760",lineHeight:1,marginBottom:2}}>✓</div>
              ) : (
                <div style={{display:"flex",gap:3,marginBottom:isToday?3:0,flexWrap:"wrap",justifyContent:"center"}}>
                  {types.slice(0,2).map(t=>(
                    <div key={t} className="dot" style={{background:tc(t),opacity:isActive?1:0.55}}/>
                  ))}
                </div>
              )}
              {isToday&&!complete&&(
                <div style={{width:4,height:4,borderRadius:"50%",background:phColor,margin:"0 auto"}}/>
              )}
              {w&&<div style={{width:6,height:6,borderRadius:"50%",
                background:w.l==="red"?"#e8274b":"#e8c84a",
                position:"absolute",top:4,right:4}}/>}
            </div>
          );
        })}
      </div>

      {/* Swap scope prompt */}
      {pendingSwap && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",zIndex:800,
          display:"flex",alignItems:"flex-end",justifyContent:"center"}}
          onClick={()=>setPendingSwap(null)}>
          <div style={{background:"var(--card)",borderRadius:"20px 20px 0 0",width:"100%",
            maxWidth:600,padding:"20px 18px 40px"}} onClick={e=>e.stopPropagation()}>
            <div style={{width:36,height:4,borderRadius:2,background:"var(--border)",margin:"0 auto 16px"}}/>
            <div style={{fontSize:14,fontWeight:900,color:"#f5f5f5",marginBottom:6,fontFamily:"var(--font)"}}>
              Swap {sched[pendingSwap.from]?.day} ↔ {sched[pendingSwap.to]?.day}
            </div>
            <div style={{fontSize:12,color:"#6a6a6a",fontFamily:"var(--fontb)",marginBottom:20}}>
              Apply this swap just for this week, or change it every week going forward?
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <button onClick={()=>{
                // This week only — store swap in a weekSwap state (not persisted to sched)
                // so it resets automatically when the week changes
                const ns=[...sched];[ns[pendingSwap.from],ns[pendingSwap.to]]=[ns[pendingSwap.to],ns[pendingSwap.from]];
                try {
                  const weekKey = weekMonday.toISOString().slice(0,10);
                  localStorage.setItem(`inv4_weekswap_${weekKey}`, JSON.stringify(ns.map(d=>({day:d.day}))));
                  // Notify reactive listeners so the view updates
                  if(typeof _lsListeners!=="undefined") {
                    const key = `inv4_weekswap_${weekKey}`;
                    _lsListeners.get(key)?.forEach(fn=>fn(ns.map(d=>({day:d.day}))));
                  }
                } catch {}
                setActiveDateIdx(pendingSwap.to);
                setPendingSwap(null);
              }} style={{padding:14,borderRadius:12,border:"1.5px solid #c8a4ff",
                background:"rgba(200,164,255,.1)",color:"#c8a4ff",fontWeight:800,fontSize:13,fontFamily:"var(--font)"}}>
                📅 This week only
              </button>
              <button onClick={()=>{
                // Every week from this week forward — persist to the stored schedule
                const ns=[...sched];[ns[pendingSwap.from],ns[pendingSwap.to]]=[ns[pendingSwap.to],ns[pendingSwap.from]];
                const validFrom = getMondayOf(new Date()).toISOString().slice(0,10);
                setSched(ns.map(d=>({day:d.day, _validFrom: validFrom})));
                setActiveDateIdx(pendingSwap.to);
                setPendingSwap(null);
              }} style={{padding:14,borderRadius:12,border:"1.5px solid #1ed760",
                background:"rgba(30,215,96,.08)",color:"#1ed760",fontWeight:800,fontSize:13,fontFamily:"var(--font)"}}>
                🔁 Every week
              </button>
              <button onClick={()=>setPendingSwap(null)} style={{padding:12,borderRadius:12,
                border:"1px solid var(--border2)",background:"transparent",
                color:"#6a6a6a",fontSize:12,fontFamily:"var(--fontb)"}}>
                Cancel
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const today = new Date();
  const todayMonday = getMondayOf(today);
  const defaultDayIdx = (() => { const d=today.getDay(); return d===0?6:d-1; })();

  const [currentWeekStart, setCurrentWeekStart] = useLS("inv4_weekstart", todayMonday.toISOString());
  const [activeDateIdx, setActiveDateIdx] = useLS("inv4_activeidx", defaultDayIdx);

  // Phase transitions: an ordered list of { phase, from:'YYYY-MM-DD' } anchors.
  // For any date, the effective phase = the latest anchor on/before that date,
  // otherwise the calendar default (getPhaseForDate). This means switching phase
  // only ever applies from that week FORWARD — earlier weeks keep the phase they
  // had (and stay editable). Replaces the old single global override, which
  // retroactively repainted every past week.
  const _anchorsDefault = (() => {
    // One-time migration from the old single-value manual override: anchor it to
    // the current week so the present stays put but the past reverts correctly.

            {activePhase!=="inseason"&&(

                background:"var(--card)",border:"1.5px solid var(--border)",borderRadius:10,padding:"9px 14px"}}>
                <span style={{fontSize:10,color:"#6a6a6a",fontWeight:800,letterSpacing:".1em"}}>MAS WEEK</span>
                <button onClick={()=>setViewedMwi(viewedMwi-1)}
                  style={{width:26,height:26,borderRadius:6,background:"var(--card2)",
                    border:"1.5px solid var(--border)",color:"#b3b3b3",fontSize:14}}>−</button>
                <span style={{fontSize:15,fontWeight:900,color:pm.color,minWidth:18,textAlign:"center"}}>
                  {viewedMwi+1}
                  {weekOffset!==0&&<span style={{fontSize:9,color:"#5a5a5a",fontWeight:400,display:"block",lineHeight:1}}>
                    {weekOffset<0?`←${Math.abs(weekOffset)}w`:`→${weekOffset}w`}
                  </span>}
                </span>
                <button onClick={()=>setViewedMwi(viewedMwi+1)}
                  style={{width:26,height:26,borderRadius:6,background:"var(--card2)",
                    border:"1.5px solid var(--border)",color:"#b3b3b3",fontSize:14}}>+</button>
                {viewedMwi!==0&&<button onClick={()=>setViewedMwi(0)}
                  style={{fontSize:9,fontWeight:800,color:"#6a6a6a",background:"none",border:"none",
                    letterSpacing:".04em",padding:"2px 4px",textDecoration:"underline",cursor:"pointer"}}>
                  reset W1
                </button>}
                <span style={{fontSize:11,color:"#6a6a6a",fontFamily:"var(--fontb)"}}>of 7</span>
                <span style={{marginLeft:"auto",fontSize:10,color:"#3a3a3a",fontFamily:"var(--fontb)"}}>
                  ⠿⠿ drag pills to reorder
                </span>
              </div>
            )}

            {activeDay ? (
              <DayDetail
                day={activeDay}
                dayIdx={safeIdx}
                phase={activePhase}
                phaseColor={pm.color}
                logs={dateLogs}
                setLogs={setDateLogs}
                sched={activeSched}
                mwi={viewedMwi}
                weight={profile.weight}
                position={profile.position}
                tgtLogs={tgtLogs}
                setTgtLogs={setTgtLogs}
                activeDateKey={activeDateKey}
                activeSetSched={activeSetSched}
                storedSched={activePhase==="offseason"?offS:activePhase==="preseason"?preS:inS}
                weekDates={weekDates}
                taper={!!taperEvent}
              />
            ) : (
              <div style={{color:"#5a5a5a",fontFamily:"var(--fontb)",padding:20,textAlign:"center",fontSize:13}}>
                No session for this day.
              </div>
            )}

            <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>
              <button onClick={()=>{
                if(window.confirm(`Clear all logs and session changes for ${activeDateKey}?`)){
                  // Clear workout logs
                  const n={...logs}; delete n[activeDateKey]; setLogs(n);
                  // Clear today-only session overrides (added/removed)
                  try { localStorage.removeItem(`dayov_${activeDateKey}`); } catch {}
                  // Notify any listeners for that key
                  if(typeof _lsListeners !== "undefined") _lsListeners.get(`dayov_${activeDateKey}`)?.forEach(fn=>fn({added:[],removed:[]}));
                  // Clear permanent adds/removes for this day from stored sched
                  const stored = activePhase==="offseason"?offS:activePhase==="preseason"?preS:inS;
                  if(stored && activeDay) {
                    const cleared = stored.map(d => {
                      if(d.day !== activeDay.day) return d;
                      const {permAdded:_, permRemoved:__, ...rest} = d;
                      return rest;
                    });
                    activeSetSched(cleared);
                  }
                }
              }} className="btn bg" style={{color:"#e8274b",borderColor:"rgba(232,39,75,.25)"}}>
                🗑 Clear this day
              </button>
              <button onClick={()=>{
                const m=getMondayOf(today);
                setCurrentWeekStart(m.toISOString());
                const d=today.getDay();
                setActiveDateIdx(d===0?6:d-1);
              }} className="btn bg" style={{color:pm.color,borderColor:`${pm.color}30`}}>
                ↩ Back to today
              </button>
            </div>
          </div>
        )}
        {tab==="mas"&&<MASPage/>}
        {tab==="targets"&&<TargetsPage phase={activePhase} weight={profile.weight}
          position={profile.position} tgtLogs={tgtLogs} setTgtLogs={setTgtLogs}/>}
        {tab==="nutrition"&&<NutPage defaultDate={activeDateKey}/>}
      </div>

      {/* Footer */}
      <div style={{textAlign:"center",padding:"20px 0 8px",borderTop:"1px solid var(--border)",marginTop:20}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:4}}>
          <span style={{opacity:0.3}}><Logo size={16}/></span>
          <Wordmark color="#3a3a3a" size={12}/>
        </div>
        <div style={{fontSize:9,color:"#3a3a3a",fontFamily:"var(--fontb)",letterSpacing:".1em"}}>
          INNERVISION · ELEVATE YOUR GAME
        </div>
      </div>
    </div>
  );
}

    // Mount the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

    // Hide loading screen once React has rendered
    requestAnimationFrame(() => {
      setTimeout(() => {
        const el = document.getElementById('loading');
        if (el) { el.style.opacity = '0'; setTimeout(() => el.remove(), 400); }
      }, 300);
    });
  </script>

  <script>
    // Register service worker for offline/PWA support, and make sure new
    // deploys actually take over instead of getting stuck on an old cache.
    if ('serviceWorker' in navigator) {
      let refreshing = false;
      // If a worker is already controlling this page, a controller change means
      // a NEW version has taken over — reload once to run the fresh app.
      if (navigator.serviceWorker.controller) {
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });
      }
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' })
          .then((reg) => {
            reg.update();
            // Nudge a freshly-installed waiting worker to activate right away.
            reg.addEventListener('updatefound', () => {
              const nw = reg.installing;
              if (!nw) return;
              nw.addEventListener('statechange', () => {
                if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                  nw.postMessage('skipWaiting');
                }
              });
            });
          })
          .catch(() => {});
      });
    }
  </script>
</body>
</html>
