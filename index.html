input,select { outline:none; font-family:var(--font); }
button { cursor:pointer; font-family:var(--font); border:none; }

.fade { animation: fu .28s ease; }
@keyframes fu { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

.cl { overflow:hidden; transition:max-height .38s cubic-bezier(.4,0,.2,1), opacity .3s ease; }
.cl.open { max-height:4000px; opacity:1; }
.cl.shut { max-height:0; opacity:0; }

.day-pill {
  flex:1; min-width:42px; display:flex; flex-direction:column; align-items:center;
  padding:10px 4px 8px; border-radius:14px; border:1.5px solid var(--border);
  background:var(--card); cursor:pointer; transition:all .2s ease; user-select:none;
  -webkit-user-select:none; touch-action:manipulation;
  position:relative;
}
.day-pill:hover { background:var(--card2); border-color:var(--border2); }
.day-pill.active { background:#141414; border-color:#c8a4ff; }

.day-pill.dsrc { opacity:.35; }
.handle { touch-action:none; user-select:none; -webkit-user-select:none; }
.sec {
  background:var(--card); border:1.5px solid var(--border);
  border-radius:var(--r); overflow:hidden; margin-bottom:8px; transition:border-color .2s;
}
.sec:hover { border-color:var(--border2); }
.sec.dov-block { border-color:var(--blue)!important; }
.block-drag-wrap { touch-action:pan-y; }
.block-drag-wrap.dsrc { opacity: 0.45; }
.block-drag-wrap .sec.dov-block { border-color:var(--blue)!important; }

.sec-hdr {
  display:flex; align-items:center; gap:10px; padding:13px 15px;
  cursor:pointer; background:none; border:none; width:100%; text-align:left;
}

.inp {
  background:var(--card2); border:1.5px solid var(--border);
  color:var(--white); padding:7px 11px; border-radius:var(--r2);
  font-size:16px; font-family:var(--fontb); transition:border-color .18s;
}
.inp:focus { border-color:var(--green); }
.inp::placeholder { color:var(--grey2); }

.btn { display:inline-flex; align-items:center; gap:5px; padding:6px 14px; border-radius:20px;
  font-size:11px; font-weight:700; letter-spacing:.4px; transition:all .15s; }
.bg { background:transparent; border:1.5px solid var(--border2); color:var(--grey1); }
.bg:hover { border-color:var(--white); color:var(--white); }
.bgreen { background:var(--green); color:#000; border:none; }
.bgreen:hover { background:var(--green2); }

.chip {
  display:inline-block; font-size:10px; font-weight:800; letter-spacing:.6px;
  padding:2px 8px; border-radius:20px; font-family:var(--font);
}
.dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

.handle { color:var(--grey3); font-size:14px; cursor:grab; letter-spacing:-3px;
  padding:4px 2px; border-radius:4px; transition:color .15s; flex-shrink:0; line-height:1; }
.handle:hover { color:var(--grey2); }

.trk { background:var(--grey3); border-radius:99px; height:4px; overflow:hidden; margin-top:6px; }
.fill { height:100%; border-radius:99px; transition:width .7s cubic-bezier(.4,0,.2,1), background .4s; }

.modal-bg {
  position:fixed; inset:0; background:rgba(0,0,0,.75); backdrop-filter:blur(12px);
  z-index:999; display:flex; align-items:center; justify-content:center; padding:20px;
}
.modal {
  background:#1a1a1a; border:1.5px solid var(--border2); border-radius:20px;
  padding:28px; width:100%; max-width:400px; box-shadow:0 20px 60px rgba(0,0,0,.6);
}

/* ── Mobile responsive ── */
@media (max-width: 480px) {
  /* Tighter padding on small screens */
  .day-pill { min-width: 38px; padding: 8px 3px 6px; border-radius: 12px; }

  /* Inputs go full width on mobile */
  .inp { font-size: 14px; padding: 8px 10px; }

  /* Section headers larger tap target */
  .sec-hdr { padding: 14px 13px; min-height: 48px; }

  /* Modal fits smaller screens */
  .modal { padding: 20px; border-radius: 16px; }

  /* Prevent horizontal overflow */
  * { max-width: 100%; }
  img { max-width: 100%; }
}
`;

/* ═══ DYNAMIC TARGET SCALING SYSTEM ══════════════════════
   Targets scale by:
   1. Bodyweight ratio   — each lift has a baseline BW multiplier
                           drawn from football sports science literature
   2. Phase multiplier   — off/pre/in season adjustments
   3. Position modifier  — some positions need more/less of certain qualities

   BW multipliers (per lift, per phase) represent where
   professional-level footballers benchmark at that position:
   e.g. Trap Bar Deadlift 1.8× BW is elite academy/lower-league pro level
═══════════════════════════════════════════════════════════ */

// Per-exercise base BW multipliers at each phase for a CAM / "standard" outfield player
// Format: { off: multiplier_at_offseason_end, pre: preseason_end, ins: inseason_maintain }

// Plank / time targets (seconds) — fixed
const TIME_TARGETS = {
  plank: { off:"45", pre:"75", ins:"60" },
};

// Fixed distance/height targets (box jump cm, broad jump m) — not BW dependent
const FIXED_TARGETS = {
  boxjump: { off:"50", pre:"65", ins:"60" },
  broad:   { off:"1.8", pre:"2.2", ins:"2.0" },
  slam:    { off:"5", pre:"8", ins:"6" },
};

// Position modifiers — multipliers on certain muscle groups
// CAM = baseline (1.0 everywhere). Others adjust relative to CAM.
const POS_MOD = {
  CAM:  { lower:1.00, upper:1.00, power:1.00, core:1.00 },
  CM:   { lower:1.05, upper:1.00, power:1.00, core:1.05 },
  CDM:  { lower:1.10, upper:1.05, power:0.95, core:1.10 },
  ST:   { lower:1.05, upper:1.05, power:1.10, core:1.00 },
  LW:   { lower:0.95, upper:0.95, power:1.05, core:0.95 },
  RW:   { lower:0.95, upper:0.95, power:1.05, core:0.95 },
  CB:   { lower:1.20, upper:1.15, power:1.05, core:1.15 },
  LB:   { lower:1.05, upper:0.95, power:1.05, core:1.05 },
  RB:   { lower:1.05, upper:0.95, power:1.05, core:1.05 },
  GK:   { lower:1.10, upper:1.20, power:1.10, core:1.20 },
};

// Which category does each exercise belong to (for position modifier)
const EX_CAT = {
  trapbar:"lower",bsquat:"lower",bss:"lower",rdl:"lower",stepup:"lower",
  hamcurl:"lower",nordic:"lower",calf:"lower",leqiso:"lower",spannsq:"lower",
  bench:"upper",pullup:"upper",row:"upper",ohp:"upper",incline:"upper",
  lat:"upper",extrot:"upper",chinup:"upper",
  deadbug:"core",plank:"core",pallof:"core",russian:"core",copenh:"core",
  hanging:"core",medball:"core",sidepl:"core",
  boxjump:"power",broad:"power",clean:"power",slam:"power",
};

function getT(ex, phase, weightKg = 64, position = "CAM") {
  const phKey = { offseason:"off", preseason:"pre", inseason:"ins" }[phase] || "off";
  const bw = parseFloat(weightKg) || 64;

  // Time-based exercises
  if (TIME_TARGETS[ex.id]) return TIME_TARGETS[ex.id][phKey];

  // Fixed (non-BW) exercises
  if (FIXED_TARGETS[ex.id]) return FIXED_TARGETS[ex.id][phKey];

  const mult = BW_MULT[ex.id];
  if (!mult || mult[phKey] === null) return ex.t?.[phKey] || "-";

  // Calf raise off-season = BW only
  if (ex.id === "calf" && phKey === "off") return "BW";

  // Pull-ups off-season = BW only
  if (ex.id === "pullup" && phKey === "off") return "BW";

  // Position modifier
  const cat = EX_CAT[ex.id] || "lower";
  const posMod = POS_MOD[position]?.[cat] ?? 1.0;

  const raw = bw * mult[phKey] * posMod;
  // Round to nearest 2.5kg (standard plate increment)
  const rounded = Math.round(raw / 2.5) * 2.5;
  return rounded.toString();
}

/* ═══ UTILS ═══════════════════════════════════════════════ */
/* ── Shared localStorage hook — all subscribers to the same
   key re-render when any one of them writes.              */
const _lsListeners = new Map(); // key → Set of setState fns
function useLS(k, d) {
  const [v, sv] = useState(() => {
    try { const x = localStorage.getItem(k); return x ? JSON.parse(x) : d; } catch { return d; }
  });
  // Register this component as a listener for key k
  useEffect(() => {
    if (!_lsListeners.has(k)) _lsListeners.set(k, new Set());
    _lsListeners.get(k).add(sv);
    return () => { _lsListeners.get(k)?.delete(sv); };
  }, [k]);
  const set = useCallback(x => {
    try { localStorage.setItem(k, JSON.stringify(x)); } catch {}
    // Notify all components subscribed to this key
    _lsListeners.get(k)?.forEach(fn => fn(x));
  }, [k]);
  return [v, set];
}
function tc(t) {
  const m={gym:"#2d86ff",football:"#a78bfa",sprint:"#1ed760",vo2:"#e040fb",recovery:"#00bcd4",rest:"#6a6a6a",match:"#1ed760",prehab:"#e8c84a"};
  return m[t]||"#6a6a6a";
}
function tl(t) {
  const m={gym:"GYM",football:"BALL",sprint:"SPRINT",vo2:"VO₂",recovery:"REST",rest:"REST",match:"MATCH",prehab:"REHAB"};
  return m[t]||t.toUpperCase();
}
function dayNut(day) {
  if(day.type==="rest") return {kcal:"2150",c:"#6a6a6a"};
  if(day.type.includes("gym")||day.type.includes("sprint")) return {kcal:"2300–2400",c:"#1ed760"};
  return {kcal:"2200–2300",c:"#e8c84a"};
}
function warn(s,i) {
  const d=s[i],p=s[i-1],pp=s[i-2];
  const h=x=>x&&!x.type.startsWith("rest");
  if(h(d)&&h(p)&&h(pp)) return {l:"orange",m:"3 hard days in a row — consider shifting rest"};
  if(d.type.includes("gym")&&p?.type==="match") return {l:"red",m:"Gym after match — high injury risk"};
  return null;
}

function Chip({label,color}) {
  return <span className="chip" style={{background:`${color}18`,color,border:`1px solid ${color}30`}}>{label}</span>;
}
function Dot({color}) { return <div className="dot" style={{background:color}}/>; }

function Prog({val,target}) {
  const t=parseFloat(target), v=parseFloat(val);
  if(!t||!v||isNaN(t)||isNaN(v)) return null;
  const pct=Math.min(100,Math.round((v/t)*100));
  const hit=pct>=100;
  return (
    <div style={{marginTop:6}}>
      <div className="trk">
        <div className="fill" style={{
          width:`${pct}%`,
          background: hit
            ? "linear-gradient(90deg,#1ed760,#e8a800)"
            : `linear-gradient(90deg,#7b4fcf,#c8a4ff)`
        }}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}>
        <span style={{fontSize:10,fontFamily:"var(--fontb)",color:hit?"#1ed760":"#6a6a6a",fontWeight:hit?700:400}}>
          {hit?"✓ TARGET HIT":`${pct}%`}
        </span>
        <span style={{fontSize:10,fontFamily:"var(--fontb)",color:"#6a6a6a"}}>{val} / {target}</span>
      </div>
    </div>
  );
}

const ExRow = memo(function ExRow({ex,phase,logs,setLogs,weight,position,tgtLogs,setTgtLogs}) {
  const k=`ex_${phase}_${ex.id}`;
  const numSets=parseInt(ex.sets)||3;
  const t=useMemo(()=>getT(ex,phase,weight,position),[ex.id,phase,weight,position]);

  const pbKey=`tgt_${ex.id}`;
  const pb=tgtLogs?.[pbKey]||"";
  const lwKey=`lw_${ex.id}`;
  const lastWeekW=tgtLogs?.[lwKey]||"";
  const lwrKey=`lwr_${ex.id}`;
  const lastWeekR=tgtLogs?.[lwrKey]||"";

  const setsLog=logs[k]||[];

  // Compute all set data once per render — no repeated getSet() calls in render
  const setsData = useMemo(() => {
    return Array.from({length:numSets}, (_,i) => {
      const saved=setsLog[i]||{};
      const prevW = i>0 ? (setsLog[i-1]?.w||lastWeekW) : lastWeekW;
      const prevR = i>0 ? (setsLog[i-1]?.r||lastWeekR) : lastWeekR;
      return {
        w: saved.w ?? prevW,
        r: saved.r ?? prevR,
        done: saved.done ?? false,
      };
    });
  }, [setsLog, numSets, lastWeekW, lastWeekR]);

  const updateSet = useCallback((i, patch) => {
    const next = setsData.map(s=>({...s}));
    next[i]={...next[i],...patch};
    // Auto-fill weight AND reps into next set if empty
    if(patch.done && i < numSets-1) {
      if(!next[i+1].w) next[i+1]={...next[i+1], w: next[i].w};
      if(!next[i+1].r) next[i+1]={...next[i+1], r: next[i].r};
    }
    setLogs({...logs,[k]:next});
    // Save last week weight+reps + update PB
    if(patch.done !== false) {
      const w=parseFloat(patch.w ?? next[i].w);
      const r=patch.r ?? next[i].r;
      if(!isNaN(w) && w>0 && setTgtLogs) {
        const updates={[lwKey]:String(w)};
        if(r) updates[lwrKey]=String(r);
        if(w>(parseFloat(pb)||0)) updates[pbKey]=String(w);
        setTgtLogs({...tgtLogs,...updates});
      }
    }
  }, [setsData, logs, k, numSets, setLogs, setTgtLogs, tgtLogs, pb, pbKey, lwKey, lwrKey]);

  const allDone=useMemo(()=>numSets>0&&setsData.every(s=>s.done),[setsData,numSets]);
  const doneCnt=useMemo(()=>setsData.filter(s=>s.done).length,[setsData]);
  const hit=t&&t!=="-"&&t!=="BW"&&parseFloat(pb)>=parseFloat(t);

  return (
    <div style={{
      background:allDone?"#0d1f10":"transparent",
      border:`1.5px solid ${allDone?"rgba(30,215,96,.3)":"var(--border)"}`,
      borderRadius:10,padding:"10px 13px",marginBottom:5,transition:"all .2s"
    }}>
      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:8}}>
        <span style={{flex:1,fontFamily:"var(--fontb)",fontSize:13,fontWeight:700,
          color:allDone?"#1ed760":"#f5f5f5"}}>
          {allDone?"✓ ":""}{ex.name}
        </span>
        <span style={{fontSize:11,color:"#6a6a6a",fontFamily:"var(--fontb)"}}>{doneCnt}/{numSets} sets</span>
        {pb&&<span style={{fontSize:10,fontFamily:"var(--fontb)",color:"#c8a4ff",
          background:"rgba(200,164,255,0.1)",border:"1px solid rgba(200,164,255,0.2)",
          borderRadius:20,padding:"1px 7px",fontWeight:700}}>PB {pb}{ex.unit==="kg"?"kg":""}</span>}
        {lastWeekW&&<span style={{fontSize:10,fontFamily:"var(--fontb)",color:"#5a5a5a",
          borderRadius:20,padding:"1px 7px",fontWeight:700}}>↩ {lastWeekW}kg</span>}
        {t&&t!=="-"&&<Chip label={`${hit?"✓ ":"🎯 "}${t}${ex.unit!=="bw"&&ex.unit!=="s"?ex.unit:""}`} color={hit?"#1ed760":"#9b72cf"}/>}
      </div>
      {ex.note&&<div style={{fontSize:11,color:"#6a6a6a",fontFamily:"var(--fontb)",marginBottom:8,lineHeight:1.5}}>
        <em>{ex.note}</em>
      </div>}

      <div style={{display:"grid",gridTemplateColumns:"28px 1fr 1fr 36px",gap:5,marginBottom:4,paddingInline:2}}>
        <div/>
        <div style={{fontSize:9,color:"#4a4a4a",fontWeight:800,letterSpacing:".1em",textAlign:"center"}}>
          {ex.unit==="bw"?"WEIGHT (opt)":ex.unit==="s"?"SECS":"KG"}
        </div>
        <div style={{fontSize:9,color:"#4a4a4a",fontWeight:800,letterSpacing:".1em",textAlign:"center"}}>REPS</div>
        <div/>
      </div>

      {setsData.map((s,i)=>{
        const prevDone=i===0||setsData[i-1].done;
        const isNewPB=s.w&&pb&&parseFloat(s.w)>parseFloat(pb);
        return (
          <div key={i} style={{display:"grid",gridTemplateColumns:"28px 1fr 1fr 36px",
            gap:5,marginBottom:4,alignItems:"center",
            opacity:(!prevDone&&!s.done)?0.35:1,transition:"opacity .2s"}}>
            <div style={{fontFamily:"var(--fontb)",fontSize:11,fontWeight:800,
              color:s.done?"#1ed760":"#5a5a5a",textAlign:"center"}}>{i+1}</div>
            <div style={{position:"relative"}}>
              <input className="inp" value={s.w}
                onChange={e=>updateSet(i,{w:e.target.value})}
                placeholder={lastWeekW||"kg"}
                readOnly={s.done}
                style={{width:"100%",textAlign:"center",padding:"7px 6px",
                  borderColor:s.done?"rgba(30,215,96,.4)":isNewPB?"rgba(30,215,96,.6)":"",
                  background:s.done?"rgba(30,215,96,.06)":"",
                  color:s.done?"#1ed760":isNewPB?"#1ed760":"",fontSize:15}}/>
              {isNewPB&&!s.done&&(
                <span style={{position:"absolute",top:-7,right:2,fontSize:8,color:"#1ed760",
                  fontWeight:800,background:"#0d1f10",border:"1px solid rgba(30,215,96,.4)",
                  borderRadius:4,padding:"1px 4px",whiteSpace:"nowrap"}}>NEW PB</span>
              )}
            </div>
            <input className="inp" value={s.r}
              onChange={e=>updateSet(i,{r:e.target.value})}
              placeholder={lastWeekR||ex.reps||"reps"}
              readOnly={s.done}
              style={{width:"100%",textAlign:"center",padding:"7px 6px",
                borderColor:s.done?"rgba(30,215,96,.4)":"",
                background:s.done?"rgba(30,215,96,.06)":"",
                color:s.done?"#1ed760":"",fontSize:15}}/>
            <button onClick={()=>updateSet(i,{done:!s.done,w:s.w,r:s.r})}
              style={{width:34,height:34,borderRadius:8,border:"none",cursor:"pointer",
                background:s.done?"rgba(30,215,96,.2)":"var(--card2)",
                color:s.done?"#1ed760":"#4a4a4a",fontSize:16,
                display:"flex",alignItems:"center",justifyContent:"center",
                transition:"all .15s",flexShrink:0}}>
              {s.done?"✓":"○"}
            </button>
          </div>
        );
      })}
      {t&&t!=="-"&&t!=="BW"&&<Prog val={pb} target={t}/>}
    </div>
  );
});
function GymBlock({block,phase,logs,setLogs,dayIdx,phaseKey,weight,position,tgtLogs,setTgtLogs}) {
  const pool=Object.values(EX);
  const sk=`gsel_${phaseKey}_${dayIdx}_${block.id}`;
  const [sel,setSel]=useLS(sk,block.exIds||[]);
  const [customExs,setCustomExs]=useLS(`gcustom_${phaseKey}_${dayIdx}_${block.id}`,[]);
  const [swap,setSwap]=useState(false);
  const [newName,setNewName]=useState("");
  const [newSets,setNewSets]=useState("3");
  const [newReps,setNewReps]=useState("10");
  const tog=id=>setSel(sel.includes(id)?sel.filter(x=>x!==id):[...sel,id]);

  function addCustom() {
    const n=newName.trim();
    if(!n) return;
    const id="custom_"+n.toLowerCase().replace(/\W+/g,"_")+"_"+Date.now();
    const ex={id,name:n,sets:newSets||"3",reps:newReps||"10",unit:"kg",cat:"custom",note:""};
    setCustomExs([...customExs,ex]);
    setSel([...sel,id]);
    setNewName(""); setNewSets("3"); setNewReps("10");
  }

  // Merge pool with custom exercises for rendering
  const allPool=[...pool,...customExs];
  const allById=Object.fromEntries([...Object.entries(EX),...customExs.map(e=>[e.id,e])]);

  return (
    <div>
      <div style={{display:"flex",justifyContent:"flex-end",marginBottom:8}}>

        <div style={{padding:"8px 0"}}>
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:14}}>
            {allPool.map(ex=>(
              <button key={ex.id} onClick={()=>tog(ex.id)} style={{
                padding:"4px 10px",borderRadius:20,fontSize:11,fontWeight:700,
                background:sel.includes(ex.id)?"var(--green-glow)":"var(--card2)",
                border:`1.5px solid ${sel.includes(ex.id)?"#c8a4ff":"var(--border2)"}`,
                color:sel.includes(ex.id)?"#c8a4ff":"var(--grey1)",
                fontFamily:"var(--fontb)",transition:"all .15s"
              }}>{ex.name}{ex.cat==="custom"?" ✎":""}</button>
            ))}
          </div>
          {/* Add custom exercise */}
          <div style={{borderTop:"1px solid var(--border)",paddingTop:12,marginTop:4}}>
            <div style={{fontSize:10,color:"#6a6a6a",fontWeight:800,letterSpacing:".1em",marginBottom:8}}>ADD CUSTOM EXERCISE</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
              <input className="inp" value={newName} onChange={e=>setNewName(e.target.value)}
                placeholder="Exercise name…" style={{flex:1,minWidth:140}}/>
              <input className="inp" value={newSets} onChange={e=>setNewSets(e.target.value)}
                placeholder="Sets" style={{width:56}} type="number" min="1"/>
              <input className="inp" value={newReps} onChange={e=>setNewReps(e.target.value)}
                placeholder="Reps" style={{width:56}} type="number" min="1"/>
              <button className="btn bg" onClick={addCustom}
                style={{color:"#c8a4ff",borderColor:"rgba(200,164,255,.3)",whiteSpace:"nowrap"}}>
                + Add
              </button>
            </div>
          </div>
        </div>
      ):sel.map(id=>{const ex=allById[id];return ex?<ExRow key={id} ex={ex} phase={phase} logs={logs} setLogs={setLogs} weight={weight} position={position} tgtLogs={tgtLogs} setTgtLogs={setTgtLogs}/>:null;})}
    </div>
  );
}

const BlockSec = memo(function BlockSec({block,phase,logs,setLogs,dayIdx,phaseKey,weight,position,tgtLogs,setTgtLogs}) {
  const [open,setOpen]=useState(false);
  // Reset open state when block changes (day switch)
  const prevBlockId = useRef(block.id);
  useEffect(() => {
    if (prevBlockId.current !== block.id) {
      setOpen(false);
      prevBlockId.current = block.id;
    }
  }, [block.id]);
  const bk=`${phase}_${dayIdx}_${block.id}`;

  const done = useMemo(() => {
    if(block.kind==="prehab") return !!(logs[`prehab_${bk}`]||{}).done;
    if(block.kind==="gym") {
      let sel=block.exIds||[];
      try{const saved=localStorage.getItem(`gsel_${phaseKey}_${dayIdx}_${block.id}`);if(saved)sel=JSON.parse(saved);}catch{}
      if(!sel.length) return false;
      return sel.every(id=>{
        const k=`ex_${phase}_${id}`;
        const setsLog=logs[k];
        if(!Array.isArray(setsLog)||setsLog.length===0) return false;
        return setsLog.every(s=>s.done);
      });
    }
    if(block.kind==="foot") {
      const items=block.items||[];
      if(!items.length) return false;
      return items.every(it=>{const k=`fi_${bk}_${(it.n||"").slice(0,14).replace(/\W/g,"_")}`;return !!(logs[k]||{}).done;});
    }
    if(block.kind==="sprint") {
      const items=block.items||[];
      if(!items.length) return false;
      return items.every(it=>{const k=`sp_${bk}_${(it.n||"").slice(0,14).replace(/\W/g,"_")}`;return !!(logs[k]||{}).done;});
    }
    return false;
  }, [block, bk, logs, phase, phaseKey, dayIdx]);

  return (
    <div className="sec" style={{borderColor:done?"rgba(30,215,96,.45)":`${block.color}20`,background:done?"rgba(30,215,96,.04)":undefined,transition:"all .3s"}}>
      <button className="sec-hdr" onClick={()=>setOpen(o=>!o)}>
        <span className="handle" title="Drag to another day">⠿⠿</span>
        <span style={{fontSize:15}}>{block.icon}</span>
        <span style={{flex:1,fontFamily:"var(--font)",fontSize:13,fontWeight:700,color:done?"#1ed760":block.color,letterSpacing:".02em"}}>{done?"✓ ":""}{block.title}</span>
        <span style={{color:"var(--grey2)",fontSize:18,display:"inline-block",transition:"transform .25s",transform:open?"rotate(0)":"rotate(-90deg)"}}>⌄</span>
      </button>
      <div className={`cl ${open?"open":"shut"}`}>
        <div style={{padding:"2px 15px 14px"}}>
          {block.kind==="prehab"&&<PrehabBlock bk={bk} logs={logs} setLogs={setLogs}/>}
          {block.kind==="gym"&&<GymBlock block={block} phase={phase} logs={logs} setLogs={setLogs} dayIdx={dayIdx} phaseKey={phaseKey} weight={weight} position={position} tgtLogs={tgtLogs} setTgtLogs={setTgtLogs}/>}
          {block.kind==="foot"&&block.items?.map((it,i)=><FootItem key={i} item={it} bk={bk} logs={logs} setLogs={setLogs}/>)}
          {block.kind==="sprint"&&block.items?.map((it,i)=><SprintItem key={i} item={it} bk={bk} logs={logs} setLogs={setLogs}/>)}
        </div>
      </div>
    </div>
  );
});

/* ── Session Manager Modal ───────────────────────────────── */
function SessionManagerModal({day, dayIdx, phase, activeDateKey, sched, activeSetSched, onClose}) {
  const [action, setAction] = useState(null);
  const [scope,  setScope]  = useState(null);
  const [picked, setPicked] = useState(null);
  const [ovs, setOvs] = useLS(`dayov_${activeDateKey}`, {added:[], removed:[]});

  const allBlocks = day.blocks || [];
  const AM_KINDS  = new Set(["prehab","sprint","foot"]);

  function doAddToday() {
    const preset = BLOCK_PRESETS.flatMap(g => g.items).find(p => p.key === picked);
    if (!preset) return;
    const block = {...preset, id: preset.key + "_" + Date.now()};
    delete block.key; delete block.group;
    setOvs({...ovs, added: [...(ovs.added||[]), block]});
    onClose();
  }
  function doRemoveToday() {
    if (!picked) return;
    setOvs({...ovs, removed: [...(ovs.removed||[]), picked]});
    onClose();
  }
  function doAddAlways() {
    const preset = BLOCK_PRESETS.flatMap(g => g.items).find(p => p.key === picked);
    if (!preset) return;
    const block = {...preset, id: preset.key + "_perm"};
    delete block.key; delete block.group;
    const newSched = sched.map((d, i) => i !== dayIdx ? d : {...d, blocks: [...(d.blocks||[]), block]});
    activeSetSched(newSched);
    onClose();
  }
  function doRemoveAlways() {
    if (!picked) return;
    const newSched = sched.map((d, i) => i !== dayIdx ? d : {...d, blocks: (d.blocks||[]).filter(b => b.id !== picked)});
    activeSetSched(newSched);
    onClose();
  }

  const Btn = ({onClick, emoji, title, sub}) => (
    <button onClick={onClick} style={{width:"100%",padding:"14px 16px",borderRadius:12,
      border:"1.5px solid var(--border2)",background:"var(--card2)",display:"flex",
      alignItems:"center",gap:12,textAlign:"left",color:"#f5f5f5",marginBottom:8,transition:"all .15s"}}>
      <span style={{fontSize:22}}>{emoji}</span>
      <div><div style={{fontWeight:700,fontSize:13}}>{title}</div>
        <div style={{fontSize:11,color:"#6a6a6a",marginTop:2}}>{sub}</div></div>
    </button>
  );
  const Back = ({to}) => (
    <button onClick={to} style={{background:"none",border:"none",color:"#5a5a5a",
      fontSize:12,fontFamily:"var(--fontb)",marginBottom:14,display:"flex",alignItems:"center",gap:4}}>← Back</button>
  );

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{maxHeight:"88vh",overflowY:"auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
          <span style={{fontSize:20}}>⚙</span>
          <div style={{flex:1}}>
            <div style={{fontFamily:"var(--font)",fontSize:15,fontWeight:900}}>Manage Sessions</div>
            <div style={{fontSize:11,color:"#6a6a6a",fontFamily:"var(--fontb)",marginTop:2}}>{day.day} — {day.label}</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#5a5a5a",fontSize:22,lineHeight:1}}>✕</button>
        </div>

        {!action && <>
          <div style={{fontSize:10,color:"#6a6a6a",fontWeight:800,letterSpacing:".12em",marginBottom:10}}>WHAT DO YOU WANT TO DO?</div>
          <Btn onClick={()=>setAction("add")}    emoji="➕" title="Add a session"    sub="Add a block to this day"/>
          <Btn onClick={()=>setAction("remove")} emoji="🗑" title="Remove a session" sub="Remove a block from this day"/>
        </>}

        {action==="add" && !scope && <>
          <Back to={()=>setAction(null)}/>
          <div style={{fontSize:10,color:"#6a6a6a",fontWeight:800,letterSpacing:".12em",marginBottom:10}}>APPLY TO…</div>
          <Btn onClick={()=>setScope("today")}  emoji="📅" title="Today only"  sub={`One-off for ${activeDateKey}`}/>
          <Btn onClick={()=>setScope("always")} emoji="🔁" title="Every week"  sub={`Permanently add to ${day.day}`}/>
        </>}

        {action==="add" && scope && <>
          <Back to={()=>setScope(null)}/>
          <div style={{fontSize:10,color:"#6a6a6a",fontWeight:800,letterSpacing:".12em",marginBottom:12}}>CHOOSE A BLOCK TO ADD</div>
          {BLOCK_PRESETS.map(grp => (
            <div key={grp.group} style={{marginBottom:14}}>
              <div style={{fontSize:9,color:"#4a4a4a",fontWeight:800,letterSpacing:".12em",marginBottom:6}}>{grp.group.toUpperCase()}</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {grp.items.map(p => (
                  <button key={p.key} onClick={()=>setPicked(p.key)} style={{
                    padding:"7px 13px",borderRadius:20,fontSize:11,fontWeight:700,
                    border:`1.5px solid ${picked===p.key?p.color:"var(--border2)"}`,
                    background:picked===p.key?`${p.color}18`:"var(--card2)",
                    color:picked===p.key?p.color:"#aaa",transition:"all .15s"
                  }}>{p.icon} {p.title}</button>
                ))}
              </div>
            </div>
          ))}
          {picked && <div style={{fontSize:10,color:"#6a6a6a",fontFamily:"var(--fontb)",marginBottom:10}}>
            Adds to <strong style={{color:"#f5f5f5"}}>{BLOCK_PRESETS.flatMap(g=>g.items).find(p=>p.key===picked)?.slot==="am"?"☀ AM":"🌙 PM"}</strong>
          </div>}
          <button onClick={scope==="today"?doAddToday:doAddAlways} disabled={!picked}
            style={{width:"100%",padding:13,borderRadius:12,fontWeight:900,fontSize:13,border:"none",
              background:picked?"#c8a4ff":"#1e1e1e",color:picked?"#000":"#4a4a4a",transition:"all .2s"}}>
            {scope==="today"?"Add to Today →":"Add Every Week →"}
          </button>
        </>}

        {action==="remove" && !scope && <>
          <Back to={()=>setAction(null)}/>
          <div style={{fontSize:10,color:"#6a6a6a",fontWeight:800,letterSpacing:".12em",marginBottom:10}}>APPLY TO…</div>
          <Btn onClick={()=>setScope("today")}  emoji="📅" title="Today only" sub={`Skip for ${activeDateKey} only`}/>
          <Btn onClick={()=>setScope("always")} emoji="🔁" title="Every week"  sub={`Permanently remove from ${day.day}`}/>
        </>}

        {action==="remove" && scope && <>
          <Back to={()=>setScope(null)}/>
          <div style={{fontSize:10,color:"#6a6a6a",fontWeight:800,letterSpacing:".12em",marginBottom:10}}>CHOOSE BLOCK TO REMOVE</div>
          {allBlocks.length===0 && <div style={{color:"#5a5a5a",fontSize:12}}>No blocks on this day.</div>}
          {allBlocks.map(b => (
            <button key={b.id} onClick={()=>setPicked(b.id)} style={{
              width:"100%",padding:"12px 14px",borderRadius:10,marginBottom:6,
              border:`1.5px solid ${picked===b.id?"#e8274b":"var(--border)"}`,
              background:picked===b.id?"rgba(232,39,75,.08)":"var(--card2)",
              display:"flex",alignItems:"center",gap:10,textAlign:"left",color:"#f5f5f5",transition:"all .15s"
            }}>
              <span style={{fontSize:16}}>{b.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:700,color:picked===b.id?"#e8274b":b.color}}>{b.title}</div>
                <div style={{fontSize:10,color:"#5a5a5a",fontFamily:"var(--fontb)",marginTop:2}}>
                  {AM_KINDS.has(b.kind)?"☀ AM":"🌙 PM"} slot
                </div>
              </div>
              {picked===b.id && <span style={{color:"#e8274b"}}>✕</span>}
            </button>
          ))}
          <button onClick={scope==="today"?doRemoveToday:doRemoveAlways} disabled={!picked}
            style={{marginTop:4,width:"100%",padding:13,borderRadius:12,fontWeight:900,fontSize:13,border:"none",
              background:picked?"#e8274b":"#1e1e1e",color:picked?"#fff":"#4a4a4a",transition:"all .2s"}}>
            {scope==="today"?"Skip Today →":"Remove Every Week →"}
          </button>
        </>}
      </div>
    </div>
  );
}

/* ── DAY DETAIL ─────────────────────────────────────────── */
function DayDetail({day,dayIdx,phase,phaseColor,logs,setLogs,sched,mwi,weight,position,tgtLogs,setTgtLogs,activeDateKey,activeSetSched}) {
  const mw  = MAS[Math.min(mwi,5)];
  const w   = warn(sched,dayIdx);
  const nut = dayNut(day);
  const types  = day.type.split("+");
  const hasMAS = day.type.includes("sprint")||day.type.includes("vo2");
  const [showMgr, setShowMgr] = useState(false);

  // Reactive overrides — shared useLS means modal writes update this instantly
  const [ovs] = useLS(`dayov_${activeDateKey}`, {added:[], removed:[]});
  const removedIds = useMemo(() => new Set(ovs.removed||[]), [ovs]);

  // Split base blocks into AM / PM
  const AM_KINDS = useMemo(() => new Set(["prehab","sprint","foot"]), []);
  const baseBlocks = day.blocks || [];
  const baseAm = useMemo(() => baseBlocks.filter(b => AM_KINDS.has(b.kind)), [baseBlocks, AM_KINDS]);
  const basePm = useMemo(() => baseBlocks.filter(b => !AM_KINDS.has(b.kind)), [baseBlocks, AM_KINDS]);

  // Merge overrides
  const visAm = useMemo(() =>
    [...baseAm, ...(ovs.added||[]).filter(b => b.slot==="am")].filter(b => !removedIds.has(b.id)),
    [baseAm, ovs, removedIds]);
  const visPm = useMemo(() =>
    [...basePm, ...(ovs.added||[]).filter(b => b.slot!=="am")].filter(b => !removedIds.has(b.id)),
    [basePm, ovs, removedIds]);

  // Local display order (reorder-only, not persisted)
  const [amOrder, setAmOrder] = useState([]);
  const [pmOrder, setPmOrder] = useState([]);
  useEffect(() => { setAmOrder(visAm); }, [visAm]);
  useEffect(() => { setPmOrder(visPm); }, [visPm]);

  // Drag across both slots
  const dragSrc   = useRef(null);
  const dragMoved = useRef(false);
  const [dragState, setDragState] = useState(null);

  function onHandleStart(e, slot, idx) {
    if (!e.target.closest('.handle')) return;
    e.stopPropagation();
    dragSrc.current = {slot, idx};
    dragMoved.current = false;
    setDragState({slot, idx});
  }
  function onHandleMove(e) {
    if (!dragSrc.current) return;
    e.preventDefault();
    dragMoved.current = true;
    const t = e.touches[0];
    const el = document.elementFromPoint(t.clientX, t.clientY);
    const wrap = el?.closest('.block-drag-wrap');
    document.querySelectorAll('.block-drag-wrap').forEach(w => w.classList.remove('dov-block'));
    if (wrap) wrap.classList.add('dov-block');
  }
  function onHandleEnd(e) {
    if (!dragSrc.current) return;
    const src = dragSrc.current;
    dragSrc.current = null;
    setDragState(null);
    document.querySelectorAll('.block-drag-wrap').forEach(w => w.classList.remove('dov-block'));
    if (!dragMoved.current) return;
    dragMoved.current = false;
    const t = e.changedTouches[0];
    const el = document.elementFromPoint(t.clientX, t.clientY);
    const wrap = el?.closest('.block-drag-wrap');
    if (!wrap) return;
    const tSlot = wrap.dataset.slot;
    const tIdx  = parseInt(wrap.dataset.idx);
    if (!tSlot || isNaN(tIdx)) return;
    if (tSlot === src.slot && tIdx !== src.idx) {
      if (src.slot === "am") { const nb=[...amOrder]; const[m]=nb.splice(src.idx,1); nb.splice(tIdx,0,m); setAmOrder(nb); }
      else                   { const nb=[...pmOrder]; const[m]=nb.splice(src.idx,1); nb.splice(tIdx,0,m); setPmOrder(nb); }
    } else if (tSlot !== src.slot) {
      if (src.slot === "am" && amOrder[src.idx]) {
        const na=[...amOrder]; const[m]=na.splice(src.idx,1);
        const np=[...pmOrder]; np.splice(tIdx,0,m);
        setAmOrder(na); setPmOrder(np);
      } else if (src.slot === "pm" && pmOrder[src.idx]) {
        const np=[...pmOrder]; const[m]=np.splice(src.idx,1);
        const na=[...amOrder]; na.splice(tIdx,0,m);
        setPmOrder(np); setAmOrder(na);
      }
    }
  }

  function renderList(blocks, slot) {
    return blocks.map((b, bi) => (
      <div key={`${b.id}_${slot}_${bi}`}
        className={`block-drag-wrap${dragState?.slot===slot&&dragState?.idx===bi?" dsrc":""}`}
        data-slot={slot} data-idx={String(bi)}
        onTouchStart={e => onHandleStart(e, slot, bi)}
        onTouchMove={onHandleMove}
        onTouchEnd={onHandleEnd}>
        <BlockSec block={b} phase={phase} logs={logs} setLogs={setLogs}
          dayIdx={dayIdx} phaseKey={phase} weight={weight} position={position}
          tgtLogs={tgtLogs} setTgtLogs={setTgtLogs}/>
      </div>
    ));
  }

  const POSFOCUS = {
    CAM:"Focus: movement between lines, third-man runs, quick combinations, finishing",
    CM: "Focus: box-to-box engine, winning second balls, progressive passing, press resistance",
    CDM:"Focus: positioning, intercepting, recycling possession, screen the back four",
    ST: "Focus: movement in behind, hold-up play, clinical finishing, aerial threat",
    LW: "Focus: 1v1 directness, crossing quality, cutting inside onto strong foot, pace in behind",
    RW: "Focus: 1v1 directness, crossing quality, cutting inside onto strong foot, pace in behind",
    CB: "Focus: aerial dominance, stepping out aggressively, ball out from back, defensive shape",
    LB: "Focus: overlapping runs, defensive positioning, crossing, recovery pace",
    RB: "Focus: overlapping runs, defensive positioning, crossing, recovery pace",
    GK: "Focus: distribution under pressure, positioning, commanding the box, shot-stopping angles",
  };

  return (
    <div className="fade">
      {showMgr && <SessionManagerModal
        day={day} dayIdx={dayIdx} phase={phase}
        activeDateKey={activeDateKey} sched={sched} activeSetSched={activeSetSched}
        onClose={() => setShowMgr(false)}/>}

      {/* Day banner */}
      <div style={{background:`linear-gradient(135deg,${phaseColor}12,transparent 70%)`,
        border:`1.5px solid ${phaseColor}25`,borderRadius:14,padding:"18px 20px",marginBottom:12}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
          <div>
            <div style={{fontSize:10,color:phaseColor,fontWeight:800,letterSpacing:".12em",marginBottom:5,textTransform:"uppercase"}}>
              {day.day} · {PHASES[phase].dates}</div>
            <div style={{fontSize:21,fontWeight:900,letterSpacing:"-.01em",lineHeight:1.1}}>{day.label}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:12,color:nut.c,fontWeight:700,marginBottom:4}}>🍽 {nut.kcal} kcal</div>
            <div style={{fontSize:11,color:"#6a6a6a",fontFamily:"var(--fontb)"}}>P: 140g min · {weight}kg</div>
            <div style={{display:"flex",gap:4,marginTop:6,justifyContent:"flex-end",flexWrap:"wrap"}}>
              {types.map(t => <Chip key={t} label={tl(t)} color={tc(t)}/>)}
            </div>
          </div>
        </div>
        {w && <div style={{marginTop:10,padding:"7px 12px",borderRadius:8,
          background:w.l==="red"?"rgba(232,39,75,.1)":"rgba(255,140,0,.1)",
          border:`1px solid ${w.l==="red"?"rgba(232,39,75,.4)":"rgba(255,140,0,.4)"}`,
          fontSize:12,color:w.l==="red"?"#e8274b":"#e8c84a",fontFamily:"var(--fontb)"}}>
          {w.l==="red"?"🔴":"⚠️"} {w.m}
        </div>}
      </div>

      {/* Position focus */}
      {day.type.includes("football") && <div style={{background:"var(--card)",
        border:"1.5px solid var(--border)",borderRadius:10,padding:"8px 14px",marginBottom:10,
        display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:14}}>📍</span>
        <span style={{fontSize:11,fontFamily:"var(--fontb)",color:"#6a6a6a",lineHeight:1.5}}>
          <strong style={{color:"var(--purple)"}}>{position} focus:</strong> {POSFOCUS[position]||POSFOCUS.CAM}
        </span>
      </div>}

      {/* ☀ AM */}
      {amOrder.length > 0 && <div style={{marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
          <div style={{flex:1,height:1,background:"var(--border)"}}/>
          <span style={{fontSize:10,fontWeight:800,letterSpacing:".14em",color:"#e8c84a",
            padding:"3px 12px",borderRadius:20,background:"rgba(232,200,74,.08)",
            border:"1px solid rgba(232,200,74,.2)",fontFamily:"var(--fontb)"}}>☀ AM SESSION</span>
          <div style={{flex:1,height:1,background:"var(--border)"}}/>
        </div>
        {renderList(amOrder, "am")}
      </div>}

      {/* 🌙 PM */}
      {pmOrder.length > 0 && <div style={{marginBottom:8}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
          <div style={{flex:1,height:1,background:"var(--border)"}}/>
          <span style={{fontSize:10,fontWeight:800,letterSpacing:".14em",color:"#7b9cff",
            padding:"3px 12px",borderRadius:20,background:"rgba(123,156,255,.08)",
            border:"1px solid rgba(123,156,255,.2)",fontFamily:"var(--fontb)"}}>🌙 PM SESSION</span>
          <div style={{flex:1,height:1,background:"var(--border)"}}/>
        </div>
        {renderList(pmOrder, "pm")}
      </div>}

      {/* ⚙ Manage Sessions */}
      <button onClick={() => setShowMgr(true)} style={{width:"100%",padding:"11px",borderRadius:12,
        marginTop:6,marginBottom:4,background:"transparent",
        border:"1.5px dashed rgba(200,164,255,.35)",color:"#c8a4ff",fontSize:12,fontWeight:700,
        letterSpacing:".04em",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        ⚙ Manage Sessions
      </button>

      {/* Override badge */}
      {((ovs.added||[]).length>0||(ovs.removed||[]).length>0) && <div style={{
        fontSize:10,color:"#5a5a5a",fontFamily:"var(--fontb)",textAlign:"center",marginBottom:8}}>
        {(ovs.added||[]).length>0 && <span style={{color:"#1ed760"}}>+{ovs.added.length} added </span>}
        {(ovs.removed||[]).length>0 && <span style={{color:"#e8274b"}}>−{ovs.removed.length} removed </span>}
        today only
      </div>}

      {hasMAS && <div style={{background:"var(--card)",border:"1.5px dashed var(--border)",
        borderRadius:10,padding:"10px 14px",marginTop:4}}>
        <div style={{fontSize:9,color:"#6a6a6a",fontWeight:800,letterSpacing:".15em",marginBottom:6}}>
          MAS WEEK {mw.w} REFERENCE</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
          {[["Session 1",mw.rect],["Session 2a",mw.s2a],["Session 2b",mw.s2b]].map(([l,v])=>(
            <div key={l} style={{fontSize:11,fontFamily:"var(--fontb)"}}>
              <span style={{color:"#9b72cf"}}>{l}: </span><span style={{color:"#b3b3b3"}}>{v}</span>
            </div>
          ))}
        </div>
      </div>}
    </div>
  );
}

/* ── TARGETS ─────────────────────────────────────────────── */
function TargetsPage({phase,weight,position,tgtLogs,setTgtLogs}) {
  const logs=tgtLogs||{};
  const setLogs=setTgtLogs||(()=>{});
  const pc=PHASES[phase].color;
  const cats=[

/* ── REAL CALENDAR HELPERS ───────────────────────────────── */
const MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAY_NAMES   = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

function getMondayOf(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}
function getWeekDates(monday) {
  return Array.from({length:7}, (_,i) => {
    const d = new Date(monday);
    d.setDate(d.getDate() + i);
    return d;
  });
}
function formatDate(d) {
  return `${d.getDate()} ${MONTH_NAMES[d.getMonth()]}`;
}
function isSameDay(a, b) {
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}
function getPhaseBoundaries(year) {
  return {
    offseason: { start: new Date(year, 4, 25), end: new Date(year, 6, 4)  },
    preseason: { start: new Date(year, 6, 5),  end: new Date(year, 7, 1)  },
    inseason:  { start: new Date(year, 7, 2),  end: new Date(year+1, 4, 24) },
  };
}
function getPhaseForDate(date) {
  const y = date.getFullYear();
  const b = getPhaseBoundaries(y);
  if (date >= b.offseason.start && date <= b.offseason.end) return "offseason";
  if (date >= b.preseason.start && date <= b.preseason.end) return "preseason";
  return "inseason";
}

/* ── CALENDAR STRIP (real dates) ─────────────────────────── */
function CalStrip({weekDates,activeDateIdx,setActiveDateIdx,weekPhases,weekMonday,setCurrentWeekStart,sched,setSched,dragD,setDragD,logs,isDayComplete,phaseColor}) {
  const today = new Date();
  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <button onClick={()=>{
          const prev = new Date(weekMonday);
          prev.setDate(prev.getDate()-7);
          setCurrentWeekStart(prev.toISOString());
          setActiveDateIdx(0);
        }} style={{background:"var(--card2)",border:"1.5px solid var(--border)",color:"#b3b3b3",
          borderRadius:8,padding:"4px 14px",fontSize:16,fontWeight:700,lineHeight:1}}>‹</button>
        <div style={{fontSize:11,color:"#6a6a6a",fontFamily:"var(--fontb)",fontWeight:600,letterSpacing:".05em",textAlign:"center"}}>
          {formatDate(weekDates[0])} — {formatDate(weekDates[6])}
          <span style={{color:"#3a3a3a"}}> · {weekDates[0].getFullYear()}</span>
        </div>
        <button onClick={()=>{
          const next = new Date(weekMonday);
          next.setDate(next.getDate()+7);
          setCurrentWeekStart(next.toISOString());
          setActiveDateIdx(0);
        }} style={{background:"var(--card2)",border:"1.5px solid var(--border)",color:"#b3b3b3",
          borderRadius:8,padding:"4px 14px",fontSize:16,fontWeight:700,lineHeight:1}}>›</button>
      </div>
      <div style={{display:"flex",gap:4,overflowX:"auto",paddingBottom:2,"--phase-color":PHASES[weekPhases?.[activeDateIdx]]?.color||"#c8a4ff"}}>
        {weekDates.map((date,i)=>{
          const dayPhase   = weekPhases[i];
          const phColor    = PHASES[dayPhase]?.color || phaseColor;
          const isToday    = isSameDay(date, today);
          const isActive   = activeDateIdx === i;
          const dateKey    = date.toISOString().slice(0,10);
          const complete   = isDayComplete(dateKey, sched, i);
          const day        = sched[i];
          const w          = day ? warn(sched,i) : null;
          const types      = day ? day.type.split("+") : ["rest"];

          return (
            <div key={i}
              className={`day-pill${isActive?" active":""}${dragD===i?" dsrc":""}`}
              onClick={()=>{ if(!dragD) setActiveDateIdx(i); }}
              onTouchStart={e=>{
                e.stopPropagation();
                setDragD(i);
              }}
              onTouchMove={e=>{
                e.preventDefault();
                const touch = e.touches[0];
                const el = document.elementFromPoint(touch.clientX, touch.clientY);
                const pill = el?.closest('.day-pill');
                document.querySelectorAll('.day-pill').forEach(p=>p.classList.remove('dov'));
                if(pill && pill !== e.currentTarget) pill.classList.add('dov');
              }}
              onTouchEnd={e=>{
                e.stopPropagation();
                const touch = e.changedTouches[0];
                const el = document.elementFromPoint(touch.clientX, touch.clientY);
                const pill = el?.closest('.day-pill');
                document.querySelectorAll('.day-pill').forEach(p=>p.classList.remove('dov'));
                if(pill){
                  const pills = Array.from(document.querySelectorAll('.day-pill'));
                  const targetIdx = pills.indexOf(pill);
                  if(targetIdx !== -1 && targetIdx !== dragD && dragD !== null){
                    const ns=[...sched];[ns[dragD],ns[targetIdx]]=[ns[targetIdx],ns[dragD]];
                    // Save just the ordering (day names) so the schedule rebuilds with correct MAS text
                    setSched(ns.map(d=>({day:d.day}))); setActiveDateIdx(targetIdx);
                  }
                }
                setDragD(null);
              }}
              style={{
                borderColor: complete ? "rgba(30,215,96,.6)"
                           : isActive ? phColor
                           : isToday  ? phColor+"55"
                           : undefined,
                background: complete && !isActive ? "rgba(30,215,96,.07)" : undefined,
              }}
            >
              <div style={{fontSize:9,color:isActive?phColor:"var(--grey3)",
                letterSpacing:"-2.5px",marginBottom:1,cursor:"grab",lineHeight:1}}>⠿⠿</div>
              <div style={{fontSize:9,fontWeight:700,
                color:isActive?phColor:complete?"#1ed760":"#5a5a5a",
                letterSpacing:".04em",marginBottom:1}}>{DAY_NAMES[i]}</div>
              <div style={{fontSize:12,fontWeight:900,
                color:isActive?phColor:complete?"#1ed760":isToday?"#ffffff":"#7a7a7a",
                marginBottom:3}}>
                {date.getDate()}
              </div>
              {/* Type dots or complete tick */}
              {complete ? (
                <div style={{fontSize:12,color:"#1ed760",lineHeight:1,marginBottom:2}}>✓</div>
              ) : (
                <div style={{display:"flex",gap:3,marginBottom:isToday?3:0,flexWrap:"wrap",justifyContent:"center"}}>
                  {types.slice(0,2).map(t=>(
                    <div key={t} className="dot" style={{background:tc(t),opacity:isActive?1:0.55}}/>
                  ))}
                </div>
              )}
              {isToday&&!complete&&(
                <div style={{width:4,height:4,borderRadius:"50%",background:phColor,margin:"0 auto"}}/>
              )}
              {w&&<div style={{width:6,height:6,borderRadius:"50%",
                background:w.l==="red"?"#e8274b":"#e8c84a",
                position:"absolute",top:4,right:4}}/>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── APP ─────────────────────────────────────────────────── */
function App() {
  const today = new Date();
  const todayMonday = getMondayOf(today);
  const defaultDayIdx = (() => { const d=today.getDay(); return d===0?6:d-1; })();

  const [currentWeekStart, setCurrentWeekStart] = useLS("inv4_weekstart", todayMonday.toISOString());
  const [activeDateIdx, setActiveDateIdx] = useLS("inv4_activeidx", defaultDayIdx);

  // Manual phase override — null means auto-detect from date
  const [manualPhase, setManualPhase] = useLS("inv4_manual_phase", null);

  const weekMonday = getMondayOf(new Date(currentWeekStart));
  const weekDates  = getWeekDates(weekMonday);
  // Each day's phase: if manual override is set, all days use it
  const weekPhases = weekDates.map(d => manualPhase || getPhaseForDate(d));
  const activePhase = weekPhases[Math.min(activeDateIdx, 6)] || "inseason";
  const pm = PHASES[activePhase];

  const weekMondayRef = useRef(weekMonday);
  useEffect(() => { weekMondayRef.current = weekMonday; }, [weekMonday]);

  useEffect(() => {
    function syncToday() {
      const now = new Date();
      const nowMonday    = getMondayOf(now);
      const nowDayIdx    = now.getDay() === 0 ? 6 : now.getDay() - 1;
      const nowMondayKey = nowMonday.toISOString().slice(0, 10);
      const curMondayKey = weekMondayRef.current.toISOString().slice(0, 10);
      if (nowMondayKey !== curMondayKey) {
        setCurrentWeekStart(nowMonday.toISOString());
        setActiveDateIdx(nowDayIdx);
      } else {
        setActiveDateIdx(nowDayIdx);
      }
    }
    syncToday();
    const id = setInterval(syncToday, 30000);
    return () => clearInterval(id);
  }, []);

  const [tab, setTab] = useState("schedule");
  const [mwi, setMwi] = useLS("inv4_mwi", 0);
  const [logs, setLogs] = useLS("inv4_logs", {});
  const [tgtLogs, setTgtLogs] = useLS("tgt_logs4", {});
  const [profile, setProfile] = useLS("inv4_prof", {
    name:"", position:"CAM", weight:"64", height:"168", age:"20", goal:"Pro Contract"
  });
  const [showProf, setShowProf] = useState(false);
  const [dragD, setDragD] = useState(null);

  const [offS, setOffS] = useLS("inv4_s_off", null);
  const [preS, setPreS] = useLS("inv4_s_pre", null);
  const [inS,  setInS]  = useLS("inv4_s_in",  null);

  // Always rebuild schedule from current mwi so MAS text stays current.
  // Stored schedule only preserves day-order (drag reordering) — we merge that in.
  const activeSched = useMemo(() => {
    const fresh = buildSched(activePhase, mwi);
    const stored = activePhase==="offseason"?offS : activePhase==="preseason"?preS : inS;
    if (!stored) return fresh;
    // Re-order fresh days to match any user drag-reordering stored, by day label
    try {
      const orderedIds = stored.map(d => d.day);
      const byDay = Object.fromEntries(fresh.map(d => [d.day, d]));
      const reordered = orderedIds.map(id => byDay[id]).filter(Boolean);
      // Include any fresh days not in stored order
      const missing = fresh.filter(d => !orderedIds.includes(d.day));
      return [...reordered, ...missing];
    } catch { return fresh; }
  }, [activePhase, mwi, offS, preS, inS]);

  const activeSetSched = activePhase==="offseason"?setOffS : activePhase==="preseason"?setPreS : setInS;
  const safeIdx        = Math.min(activeDateIdx, activeSched.length-1);
  const activeDay      = activeSched[safeIdx];
  const activeDate     = weekDates[activeDateIdx];
  const activeDateKey  = activeDate ? activeDate.toISOString().slice(0,10) : "";

  const dateLogs    = logs[activeDateKey] || {};
  const setDateLogs = newDL => setLogs({ ...logs, [activeDateKey]: newDL });

  function isDayComplete(dateKey, sched, dayIdx) {
    const dl = logs[dateKey] || {};
    const day = sched[Math.min(dayIdx, sched.length-1)];
    if (!day) return false;
    let ticked = 0;
    Object.values(dl).forEach(v => {
      if (typeof v === "object" && "done" in v && v.done) ticked++;
    });
    return ticked >= 3;
  }

  // Streak = consecutive days going backwards from yesterday where isDayComplete is true.
  // Rest days count as "kept" automatically (no session needed).
  const streak = useMemo(() => {
    let count = 0;
    const check = new Date(today);
    check.setDate(check.getDate() - 1); // start from yesterday
    for (let i = 0; i < 365; i++) {
      const key = check.toISOString().slice(0, 10);
      const dow = check.getDay(); // 0=Sun
      const schedIdx = dow === 0 ? 6 : dow - 1;
      const dayPhase = manualPhase || getPhaseForDate(check);
      const daySched = buildSched(dayPhase, mwi);
      const dayDef = daySched[schedIdx];
      const isRest = dayDef?.type === "rest";
      const done = isRest || isDayComplete(key, daySched, schedIdx);
      if (done) { count++; } else { break; }
      check.setDate(check.getDate() - 1);
    }
    // Also count today if already done
    const todayKey = today.toISOString().slice(0, 10);
    const todayDow = today.getDay();
    const todayIdx = todayDow === 0 ? 6 : todayDow - 1;
    const todayPhase = manualPhase || getPhaseForDate(today);
    const todaySched = buildSched(todayPhase, mwi);
    if (isDayComplete(todayKey, todaySched, todayIdx)) count++;
    return count;
  }, [logs, today, manualPhase, mwi]);

  const TABS = [
    {id:"schedule", label:"Schedule"},
    {id:"mas",      label:"MAS / VO₂"},
    {id:"targets",  label:"Targets"},
    {id:"nutrition",label:"Nutrition"},
  ];

  const isToday = activeDate && isSameDay(activeDate, today);

  return (
    <div style={{minHeight:"100vh",background:"var(--black)",paddingBottom:60}}>
      <style>{G}</style>
      {showProf&&<ProfileModal profile={profile} onSave={setProfile} onClose={()=>setShowProf(false)}/>}

      {/* ── STICKY HEADER ── */}
      <div style={{position:"sticky",top:0,zIndex:200,paddingTop:"env(safe-area-inset-top)",
        background:"rgba(10,10,10,.96)",backdropFilter:"blur(20px)",
        borderBottom:"1px solid var(--border)"}}>
        <div style={{maxWidth:860,margin:"0 auto",padding:"12px 16px"}}>

          {/* Logo row */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <Logo size={44}/>
              <div style={{display:"flex",flexDirection:"column",justifyContent:"center"}}>
                <Wordmark size={20}/>
                <div style={{fontSize:9,color:"#5a5a5a",fontFamily:"var(--fontb)",
                  letterSpacing:".14em",marginTop:3,textTransform:"uppercase"}}>Innervision Training</div>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap",justifyContent:"flex-end"}}>
              {/* Phase buttons — manual override, with AUTO option */}
              {Object.entries(PHASES).map(([k,v])=>(
                <button key={k} onClick={()=> setManualPhase(manualPhase===k ? null : k)}
                  style={{
                    padding:"5px 9px",borderRadius:20,fontSize:10,fontWeight:800,letterSpacing:".05em",
                    border:`1.5px solid ${v.color}${activePhase===k?"":"30"}`,
                    background:activePhase===k?`${v.color}20`:"transparent",
                    color:activePhase===k?v.color:"#6a6a6a",transition:"all .2s",whiteSpace:"nowrap"
                  }}>
                  {v.label.split(" ")[0]}
                  {manualPhase===k&&<span style={{marginLeft:3,fontSize:8,opacity:.7}}>●</span>}
                </button>
              ))}
              <button onClick={()=>setShowProf(true)} style={{
                width:32,height:32,borderRadius:"50%",border:"1.5px solid var(--border)",
                background:"var(--card2)",color:"#b3b3b3",fontSize:13,display:"flex",
                alignItems:"center",justifyContent:"center",fontFamily:"var(--font)",fontWeight:700
              }}>{profile.name?profile.name[0].toUpperCase():"?"}</button>
            </div>
          </div>

          {/* Date + profile line + streak */}
          <div style={{fontSize:11,color:"#6a6a6a",fontFamily:"var(--fontb)",marginBottom:10,
            display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
            <span>
              <span style={{color:pm.color,fontWeight:700}}>{pm.label}</span>
              {manualPhase&&<span style={{color:"#5a5a5a",fontSize:10}}> (manual)</span>}
              <span style={{margin:"0 5px"}}>·</span>
              {profile.name||"Athlete"} · {profile.position} · {profile.weight}kg
            </span>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {streak > 0 && (
                <div style={{
                  display:"flex",alignItems:"center",gap:5,
                  background: streak >= 7  ? "rgba(232,200,74,.12)"
                            : streak >= 3  ? "rgba(30,215,96,.08)"
                            : "rgba(200,164,255,.08)",
                  border: `1px solid ${
                    streak >= 7  ? "rgba(232,200,74,.35)"
                    : streak >= 3  ? "rgba(30,215,96,.25)"
                    : "rgba(200,164,255,.2)"}`,
                  borderRadius:20, padding:"3px 10px"
                }}>
                  <span style={{fontSize:13}}>{streak >= 7 ? "🔥" : streak >= 3 ? "⚡" : "✦"}</span>
                  <span style={{
                    fontWeight:800, fontSize:12,
                    color: streak >= 7  ? "#e8c84a"
                         : streak >= 3  ? "#1ed760"
                         : "#c8a4ff",
                    letterSpacing:".02em"
                  }}>{streak} day{streak !== 1 ? "s" : ""}</span>
                </div>
              )}
              <span style={{color:isToday?pm.color:"#4a4a4a",fontWeight:isToday?700:400}}>
                {isToday?"TODAY":(activeDate?formatDate(activeDate):"")}
                {activeDay?" · "+activeDay.label:""}
              </span>
            </div>
          </div>

          {/* Tab bar */}
          <div style={{display:"flex",gap:2,background:"var(--card)",borderRadius:10,padding:"3px",marginBottom:10}}>
            {TABS.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{
                flex:1,padding:"7px 6px",border:"none",borderRadius:8,
                fontSize:11,fontWeight:700,letterSpacing:".03em",
                background:tab===t.id?"var(--card2)":"transparent",
                color:tab===t.id?pm.color:"#6a6a6a",transition:"all .18s"
              }}>{t.label}</button>
            ))}
          </div>

          {/* Real-date calendar strip */}
          {tab==="schedule"&&(
            <CalStrip
              weekDates={weekDates}
              activeDateIdx={activeDateIdx}
              setActiveDateIdx={setActiveDateIdx}
              weekPhases={weekPhases}
              weekMonday={weekMonday}
              setCurrentWeekStart={setCurrentWeekStart}
              sched={activeSched}
              setSched={activeSetSched}
              dragD={dragD}
              setDragD={setDragD}
              logs={logs}
              isDayComplete={isDayComplete}
              phaseColor={pm.color}
            />
          )}
        </div>
      </div>

      {/* ── CONTENT ── */}
      <div style={{maxWidth:860,margin:"0 auto",padding:"14px 16px"}}>
        {tab==="schedule"&&(
          <div>
            {activePhase!=="inseason"&&(
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,
                background:"var(--card)",border:"1.5px solid var(--border)",borderRadius:10,padding:"9px 14px"}}>
                <span style={{fontSize:10,color:"#6a6a6a",fontWeight:800,letterSpacing:".1em"}}>MAS WEEK</span>
                <button onClick={()=>setMwi(Math.max(0,mwi-1))}
                  style={{width:26,height:26,borderRadius:6,background:"var(--card2)",
                    border:"1.5px solid var(--border)",color:"#b3b3b3",fontSize:14}}>−</button>
                <span style={{fontSize:15,fontWeight:900,color:pm.color,minWidth:18,textAlign:"center"}}>{mwi+1}</span>
                <button onClick={()=>setMwi(Math.min(5,mwi+1))}
                  style={{width:26,height:26,borderRadius:6,background:"var(--card2)",
                    border:"1.5px solid var(--border)",color:"#b3b3b3",fontSize:14}}>+</button>
                <span style={{fontSize:11,color:"#6a6a6a",fontFamily:"var(--fontb)"}}>of 6</span>
                <span style={{marginLeft:"auto",fontSize:10,color:"#3a3a3a",fontFamily:"var(--fontb)"}}>
                  ⠿⠿ drag pills to reorder
                </span>
              </div>
            )}

            {activeDay ? (
              <DayDetail
                day={activeDay}
                dayIdx={safeIdx}
                phase={activePhase}
                phaseColor={pm.color}
                logs={dateLogs}
                setLogs={setDateLogs}
                sched={activeSched}
                mwi={mwi}
                weight={profile.weight}
                position={profile.position}
                tgtLogs={tgtLogs}
                setTgtLogs={setTgtLogs}
                activeDateKey={activeDateKey}
                activeSetSched={activeSetSched}
              />
            ) : (
              <div style={{color:"#5a5a5a",fontFamily:"var(--fontb)",padding:20,textAlign:"center",fontSize:13}}>
                No session for this day.
              </div>
            )}

            <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>
              <button onClick={()=>{
                if(window.confirm(`Clear log for ${activeDateKey}?`)){
                  const n={...logs}; delete n[activeDateKey]; setLogs(n);
                }
              }} className="btn bg" style={{color:"#e8274b",borderColor:"rgba(232,39,75,.25)"}}>
                🗑 Clear this day
              </button>
              <button onClick={()=>{
                const m=getMondayOf(today);
                setCurrentWeekStart(m.toISOString());
                const d=today.getDay();
                setActiveDateIdx(d===0?6:d-1);
              }} className="btn bg" style={{color:pm.color,borderColor:`${pm.color}30`}}>
                ↩ Back to today
              </button>
            </div>
          </div>
        )}
        {tab==="mas"&&<MASPage/>}
        {tab==="targets"&&<TargetsPage phase={activePhase} weight={profile.weight}
          position={profile.position} tgtLogs={tgtLogs} setTgtLogs={setTgtLogs}/>}
        {tab==="nutrition"&&<NutPage/>}
      </div>

      {/* Footer */}
      <div style={{textAlign:"center",padding:"20px 0 8px",borderTop:"1px solid var(--border)",marginTop:20}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:4}}>
          <span style={{opacity:0.3}}><Logo size={16}/></span>
          <Wordmark color="#3a3a3a" size={12}/>
        </div>
        <div style={{fontSize:9,color:"#3a3a3a",fontFamily:"var(--fontb)",letterSpacing:".1em"}}>
          INNERVISION · ELEVATE YOUR GAME
        </div>
      </div>
    </div>
  );
}

    // Mount the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

    // Hide loading screen once React has rendered
    requestAnimationFrame(() => {
      setTimeout(() => {
        const el = document.getElementById('loading');
        if (el) { el.style.opacity = '0'; setTimeout(() => el.remove(), 400); }
      }, 300);
    });
  </script>

  <script>
    // Register service worker for offline/PWA support
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
